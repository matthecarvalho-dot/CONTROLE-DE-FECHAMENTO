<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ControlePro | Login</title>
    <link rel="icon" href="logo.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --bg: #030712; --bg2: #0a0f1e; --bg3: #111827;
            --primary: #4f46e5; --primary-light: #818cf8; --secondary: #7c3aed;
            --emerald: #10b981; --red: #ef4444;
            --text: #f1f5f9; --text2: #94a3b8; --text3: #64748b;
            --border: rgba(255,255,255,0.06);
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            font-family:'Inter',sans-serif; background:var(--bg); color:var(--text);
            min-height:100vh; display:flex; align-items:center; justify-content:center;
        }
        body::before{
            content:''; position:fixed; inset:0;
            background:radial-gradient(ellipse 80% 60% at 50% -20%, rgba(79,70,229,0.1) 0%, transparent 100%),
                       radial-gradient(ellipse 60% 40% at 80% 80%, rgba(6,182,212,0.05) 0%, transparent 100%);
            pointer-events:none; z-index:0;
        }
        .container{position:relative; z-index:1; width:100%; max-width:440px; padding:20px}
        .card{
            background:rgba(17,24,39,0.7); backdrop-filter:blur(30px);
            border:1px solid var(--border); border-radius:20px; padding:40px 30px; text-align:center;
        }
        .logo{width:60px;height:60px;background:linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius:16px; display:flex;align-items:center;justify-content:center;
            font-size:26px;font-weight:800;color:#fff;margin:0 auto 20px;
            box-shadow:0 8px 25px rgba(79,70,229,0.3)}
        h2{font-size:22px;font-weight:700;margin-bottom:4px}
        h2 span{background:linear-gradient(135deg, var(--primary-light), var(--secondary));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        p.sub{font-size:13px;color:var(--text3);margin-bottom:24px}
        .input{
            width:100%;padding:14px 16px;background:rgba(255,255,255,0.03);
            border:1px solid rgba(255,255,255,0.1);border-radius:12px;
            color:#fff;font-size:14px;font-family:inherit;margin-bottom:12px;transition:all 0.3s;
        }
        .input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(79,70,229,0.15)}
        .btn{
            width:100%;padding:14px;border:none;border-radius:12px;
            color:#fff;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;
            margin-top:8px;transition:all 0.3s;
            background:linear-gradient(135deg, var(--primary), var(--secondary));
            box-shadow:0 4px 15px rgba(79,70,229,0.3);
        }
        .btn:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(79,70,229,0.4)}
        .btn:disabled{opacity:0.6;cursor:not-allowed;transform:none}
        .link{font-size:12px;color:var(--text3);margin-top:16px;cursor:pointer}
        .link:hover{color:var(--primary-light)}
        .link span{color:var(--primary-light);font-weight:600}
        .msg{display:none;padding:10px;border-radius:8px;font-size:12px;margin-bottom:12px}
        .msg.error{display:block;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:var(--red)}
        .msg.success{display:block;background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.3);color:var(--emerald)}
        .spinner{display:inline-block;width:20px;height:20px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.6s linear infinite;vertical-align:middle;margin-right:8px}
        @keyframes spin{to{transform:rotate(360deg)}}
        @media(max-width:480px){.card{padding:30px 20px}}
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="logo">CP</div>
        <h2>Controle<span>Pro</span></h2>
        <p class="sub">Sistema Executivo de Fechamento</p>
        <div id="msg" class="msg"></div>
        
        <!-- LOGIN -->
        <div id="formLogin">
            <input type="email" class="input" id="loginEmail" placeholder="Seu email" autocomplete="email">
            <input type="password" class="input" id="loginSenha" placeholder="Sua senha" autocomplete="current-password">
            <button class="btn" onclick="login()" id="btnLogin"><i class="fas fa-sign-in-alt"></i> Entrar</button>
            <div class="link">Não tem conta? <span onclick="showRegister()">Criar conta</span></div>
        </div>
        
        <!-- CADASTRO -->
        <div id="formRegister" style="display:none">
            <input type="text" class="input" id="regNome" placeholder="Seu nome completo">
            <input type="text" class="input" id="regWhatsapp" placeholder="Whatsapp (com DDD)">
            <input type="email" class="input" id="regEmail" placeholder="Seu email" autocomplete="email">
            <input type="password" class="input" id="regSenha" placeholder="Crie uma senha (mín. 6 caracteres)" autocomplete="new-password">
            <button class="btn" onclick="register()" id="btnRegister"><i class="fas fa-user-plus"></i> Criar Conta</button>
            <div class="link">Já tem conta? <span onclick="showLogin()">Fazer login</span></div>
        </div>
    </div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyCPiGXTl0k1Kq4RYEiABZ6tBxScitRhFwM",
    authDomain: "controle-de-fechamento-f8137.firebaseapp.com",
    projectId: "controle-de-fechamento-f8137",
    storageBucket: "controle-de-fechamento-f8137.firebasestorage.app",
    messagingSenderId: "1016803983243",
    appId: "1:1016803983243:web:66f2ad592c824bd847798e"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// Se já estiver logado, vai para o sistema
auth.onAuthStateChanged(user => {
    if (user) window.location.href = 'sistema.html';
});

function showRegister() {
    document.getElementById('formLogin').style.display = 'none';
    document.getElementById('formRegister').style.display = 'block';
    hideMsg();
}

function showLogin() {
    document.getElementById('formLogin').style.display = 'block';
    document.getElementById('formRegister').style.display = 'none';
    hideMsg();
}

function hideMsg() { document.getElementById('msg').className = 'msg'; }
function showMsg(text, type) {
    const m = document.getElementById('msg');
    m.textContent = text;
    m.className = 'msg ' + type;
}

async function login() {
    const email = document.getElementById('loginEmail').value.trim();
    const senha = document.getElementById('loginSenha').value;
    if (!email || !senha) return showMsg('Preencha email e senha!', 'error');
    
    const btn = document.getElementById('btnLogin');
    btn.innerHTML = '<span class="spinner"></span> Entrando...';
    btn.disabled = true;
    
    try {
        // Verificar se usuário está ativo
        const result = await auth.signInWithEmailAndPassword(email, senha);
        const userDoc = await db.collection('usuarios').doc(result.user.uid).get();
        if (userDoc.exists && userDoc.data().ativo === false) {
            await auth.signOut();
            showMsg('Sua conta foi desativada. Contate o administrador.', 'error');
            btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Entrar';
            btn.disabled = false;
            return;
        }
        window.location.href = 'sistema.html';
    } catch (e) {
        let msg = 'Erro ao fazer login.';
        if (e.code === 'auth/user-not-found') msg = 'Email não cadastrado.';
        else if (e.code === 'auth/wrong-password' || e.code === 'auth/invalid-credential') msg = 'Senha incorreta.';
        else if (e.code === 'auth/invalid-email') msg = 'Email inválido.';
        showMsg(msg, 'error');
    }
    btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Entrar';
    btn.disabled = false;
}

async function register() {
    const nome = document.getElementById('regNome').value.trim();
    const whatsapp = document.getElementById('regWhatsapp').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const senha = document.getElementById('regSenha').value;
    
    if (!nome || !email || !senha) return showMsg('Preencha todos os campos obrigatórios!', 'error');
    if (senha.length < 6) return showMsg('Senha deve ter no mínimo 6 caracteres!', 'error');
    
    const btn = document.getElementById('btnRegister');
    btn.innerHTML = '<span class="spinner"></span> Criando conta...';
    btn.disabled = true;
    
    try {
        const result = await auth.createUserWithEmailAndPassword(email, senha);
        await db.collection('usuarios').doc(result.user.uid).set({
            nome, email, whatsapp: whatsapp || '',
            ativo: true, role: 'user',
            criadoEm: firebase.firestore.FieldValue.serverTimestamp(),
            ultimoAcesso: firebase.firestore.FieldValue.serverTimestamp()
        });
        showMsg('Conta criada! Redirecionando...', 'success');
        setTimeout(() => window.location.href = 'sistema.html', 1000);
    } catch (e) {
        let msg = 'Erro ao criar conta.';
        if (e.code === 'auth/email-already-in-use') msg = 'Este email já está cadastrado.';
        else if (e.code === 'auth/invalid-email') msg = 'Email inválido.';
        else if (e.code === 'auth/weak-password') msg = 'Senha muito fraca.';
        showMsg(msg, 'error');
    }
    btn.innerHTML = '<i class="fas fa-user-plus"></i> Criar Conta';
    btn.disabled = false;
}
</script>
</body>
</html>
