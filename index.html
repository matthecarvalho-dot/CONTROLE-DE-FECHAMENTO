<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ControlePro | Sistema Executivo</title>
    <link rel="icon" href="logo.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <style>
        :root {
            --bg-primary: #030712;
            --bg-secondary: #0a0f1e;
            --bg-tertiary: #111827;
            --bg-glass: rgba(17,24,39,0.6);
            --primary: #4f46e5;
            --primary-light: #818cf8;
            --secondary: #7c3aed;
            --accent: #06b6d4;
            --emerald: #10b981;
            --red: #ef4444;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-tertiary: #64748b;
            --border: rgba(255,255,255,0.05);
            --radius-xl: 20px;
            --transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(ellipse 80% 60% at 50% -20%, rgba(79,70,229,0.08) 0%, transparent 100%),
                radial-gradient(ellipse 60% 40% at 80% 80%, rgba(6,182,212,0.05) 0%, transparent 100%);
            pointer-events: none;
            z-index: 0;
        }

        /* ============ TELA DE LOGIN ============ */
        .auth-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .auth-card {
            background: var(--bg-glass);
            backdrop-filter: blur(30px);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding: 40px 30px;
            text-align: center;
        }

        .auth-logo {
            width: 60px; height: 60px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            font-size: 26px; font-weight: 800; color: #fff;
            margin: 0 auto 20px;
            box-shadow: 0 8px 25px rgba(79,70,229,0.3);
        }

        .auth-card h2 {
            font-size: 22px; font-weight: 700;
            margin-bottom: 6px;
        }

        .auth-card h2 span {
            background: linear-gradient(135deg, var(--primary-light), var(--secondary));
            -webkit-background-clip:text; -webkit-text-fill-color:transparent;
        }

        .auth-card p {
            font-size: 13px; color: var(--text-tertiary);
            margin-bottom: 24px;
        }

        .auth-input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: #fff;
            font-size: 14px;
            font-family: inherit;
            margin-bottom: 12px;
            transition: var(--transition);
        }

        .auth-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79,70,229,0.15);
        }

        .auth-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            margin-top: 8px;
            transition: var(--transition);
            box-shadow: 0 4px 15px rgba(79,70,229,0.3);
        }

        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(79,70,229,0.4);
        }

        .auth-link {
            font-size: 12px;
            color: var(--text-tertiary);
            margin-top: 16px;
            cursor: pointer;
            transition: var(--transition);
        }

        .auth-link:hover { color: var(--primary-light); }
        .auth-link span { color: var(--primary-light); font-weight: 600; }

        .auth-error {
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.3);
            color: var(--red);
            padding: 10px;
            border-radius: 8px;
            font-size: 12px;
            margin-bottom: 12px;
            display: none;
        }

        .auth-error.show { display: block; }

        .auth-success {
            background: rgba(16,185,129,0.1);
            border: 1px solid rgba(16,185,129,0.3);
            color: var(--emerald);
            padding: 10px;
            border-radius: 8px;
            font-size: 12px;
            margin-bottom: 12px;
            display: none;
        }

        .auth-success.show { display: block; }

        /* ============ LOADING ============ */
        .loading-spinner {
            display: inline-block;
            width: 20px; height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ============ TOAST ============ */
        .toast {
            position: fixed;
            bottom: 28px; right: 28px;
            padding: 14px 22px;
            border-radius: 12px;
            font-weight: 600; font-size: 13px;
            z-index: 9999; color: #fff;
            display: flex; align-items: center; gap: 10px;
            animation: toastIn 0.4s ease;
            backdrop-filter: blur(20px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        .toast.success { background: rgba(16,185,129,0.9); }
        .toast.error { background: rgba(239,68,68,0.9); }

        @keyframes toastIn {
            from { opacity: 0; transform: translateX(100px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @media (max-width: 480px) {
            .auth-card { padding: 30px 20px; }
        }
    </style>
</head>
<body>

<!-- TELA DE LOGIN -->
<div class="auth-container" id="authScreen">
    <div class="auth-card">
        <div class="auth-logo">CP</div>
        <h2>Controle<span>Pro</span></h2>
        <p>Sistema Executivo de Fechamento</p>
        
        <div class="auth-error" id="authError"></div>
        <div class="auth-success" id="authSuccess"></div>
        
        <div id="loginForm">
            <input type="email" class="auth-input" id="loginEmail" placeholder="Seu email" autocomplete="email">
            <input type="password" class="auth-input" id="loginPassword" placeholder="Sua senha" autocomplete="current-password">
            <button class="auth-btn" onclick="fazerLogin()" id="btnLogin">
                <i class="fas fa-sign-in-alt"></i> Entrar
            </button>
            <div class="auth-link">
                Não tem conta? <span onclick="mostrarCadastro()">Criar conta</span>
            </div>
        </div>
        
        <div id="registerForm" style="display:none;">
            <input type="text" class="auth-input" id="registerName" placeholder="Seu nome">
            <input type="email" class="auth-input" id="registerEmail" placeholder="Seu email" autocomplete="email">
            <input type="password" class="auth-input" id="registerPassword" placeholder="Crie uma senha (mín. 6 caracteres)" autocomplete="new-password">
            <button class="auth-btn" onclick="criarConta()" id="btnRegister">
                <i class="fas fa-user-plus"></i> Criar Conta
            </button>
            <div class="auth-link">
                Já tem conta? <span onclick="mostrarLogin()">Fazer login</span>
            </div>
        </div>
    </div>
</div>

<script>
// ============ CONFIGURAÇÃO DO FIREBASE ============
// Substitua com os dados do SEU projeto Firebase
const firebaseConfig = {
    apiKey: "SUA_API_KEY",
    authDomain: "SEU_PROJETO.firebaseapp.com",
    projectId: "SEU_PROJETO",
    storageBucket: "SEU_PROJETO.appspot.com",
    messagingSenderId: "SEU_SENDER_ID",
    appId: "SEU_APP_ID"
};

// Inicializar Firebase
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// ============ AUTENTICAÇÃO ============

// Verificar se já está logado
auth.onAuthStateChanged((user) => {
    if (user) {
        // Usuário logado - redirecionar para o sistema
        window.location.href = 'sistema.html';
    }
});

function mostrarCadastro() {
    document.getElementById('loginForm').style.display = 'none';
    document.getElementById('registerForm').style.display = 'block';
    document.getElementById('authError').classList.remove('show');
    document.getElementById('authSuccess').classList.remove('show');
}

function mostrarLogin() {
    document.getElementById('loginForm').style.display = 'block';
    document.getElementById('registerForm').style.display = 'none';
    document.getElementById('authError').classList.remove('show');
    document.getElementById('authSuccess').classList.remove('show');
}

function showError(msg) {
    const el = document.getElementById('authError');
    el.textContent = msg;
    el.classList.add('show');
    document.getElementById('authSuccess').classList.remove('show');
}

function showSuccess(msg) {
    const el = document.getElementById('authSuccess');
    el.textContent = msg;
    el.classList.add('show');
    document.getElementById('authError').classList.remove('show');
}

function showToast(msg, type) {
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    t.innerHTML = `<i class="fas fa-${type==='success'?'check-circle':'times-circle'}"></i> ${msg}`;
    document.body.appendChild(t);
    setTimeout(() => { t.style.opacity='0'; t.style.transition='all 0.3s'; setTimeout(()=>t.remove(),300); }, 3500);
}

async function fazerLogin() {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    
    if (!email || !password) {
        showError('Preencha email e senha!');
        return;
    }
    
    const btn = document.getElementById('btnLogin');
    btn.innerHTML = '<span class="loading-spinner"></span> Entrando...';
    btn.disabled = true;
    
    try {
        await auth.signInWithEmailAndPassword(email, password);
        showToast('Login realizado com sucesso!', 'success');
        // Redirecionar após login
        setTimeout(() => {
            window.location.href = 'sistema.html';
        }, 500);
    } catch (error) {
        let msg = 'Erro ao fazer login.';
        if (error.code === 'auth/user-not-found') msg = 'Email não cadastrado.';
        if (error.code === 'auth/wrong-password') msg = 'Senha incorreta.';
        if (error.code === 'auth/invalid-email') msg = 'Email inválido.';
        if (error.code === 'auth/invalid-credential') msg = 'Email ou senha incorretos.';
        showError(msg);
    }
    
    btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Entrar';
    btn.disabled = false;
}

async function criarConta() {
    const name = document.getElementById('registerName').value.trim();
    const email = document.getElementById('registerEmail').value.trim();
    const password = document.getElementById('registerPassword').value;
    
    if (!name || !email || !password) {
        showError('Preencha todos os campos!');
        return;
    }
    
    if (password.length < 6) {
        showError('A senha deve ter pelo menos 6 caracteres!');
        return;
    }
    
    const btn = document.getElementById('btnRegister');
    btn.innerHTML = '<span class="loading-spinner"></span> Criando conta...';
    btn.disabled = true;
    
    try {
        const userCredential = await auth.createUserWithEmailAndPassword(email, password);
        
        // Salvar nome do usuário no Firestore
        await db.collection('usuarios').doc(userCredential.user.uid).set({
            nome: name,
            email: email,
            criadoEm: firebase.firestore.FieldValue.serverTimestamp()
        });
        
        showSuccess('Conta criada com sucesso! Redirecionando...');
        setTimeout(() => {
            window.location.href = 'sistema.html';
        }, 1000);
    } catch (error) {
        let msg = 'Erro ao criar conta.';
        if (error.code === 'auth/email-already-in-use') msg = 'Este email já está em uso.';
        if (error.code === 'auth/invalid-email') msg = 'Email inválido.';
        if (error.code === 'auth/weak-password') msg = 'Senha muito fraca (mínimo 6 caracteres).';
        showError(msg);
    }
    
    btn.innerHTML = '<i class="fas fa-user-plus"></i> Criar Conta';
    btn.disabled = false;
}

// ============ LOGOUT ============
window.fazerLogout = async function() {
    await auth.signOut();
    window.location.href = 'index.html';
};
</script>

</body>
</html>
