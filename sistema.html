auth.onAuthStateChanged(async(user)=>{if(!user){window.location.href='index.html';return}currentUser=user;try{const userDoc=await db.collection('usuarios').doc(user.uid).get();if(userDoc.exists){userData=userDoc.data();if(user.email===EMAIL_DONO&&userData.role!=='admin'){await db.collection('usuarios').doc(user.uid).update({role:'admin'});userData.role='admin'}}else{userData={nome:user.email.split('@')[0],email:user.email,role:user.email===EMAIL_DONO?'admin':'user',ativo:true};await db.collection('usuarios').doc(user.uid).set({nome:user.email.split('@')[0],email:user.email,role:user.email===EMAIL_DONO?'admin':'user',ativo:true,criadoEm:firebase.firestore.FieldValue.serverTimestamp(),ultimoAcesso:firebase.firestore.FieldValue.serverTimestamp()})}}catch(e){userData={nome:user.email,role:'user'}}await db.collection('usuarios').doc(user.uid).update({ultimoAcesso:firebase.firestore.FieldValue.serverTimestamp()}).catch(()=>{});document.getElementById('userNameDisplay').textContent=userData.nome||user.email.split('@')[0];document.getElementById('userAvatar').textContent=(userData.nome||user.email)[0].toUpperCase();document.getElementById('userRoleDisplay').textContent=userData.role==='admin'?'Administrador':'Usuário';if(userData.role==='admin')document.getElementById('navUsuarios').style.display='flex';await carregarVendedores();iniciarOuvinteFechamentos();setupUI()});
async function carregarVendedores(){const doc=await db.collection('config').doc('vendedores').get();vendedoresList=doc.exists?(doc.data().lista||[]):['PATRICIA','JULYA','EVELLYN','NATALY','VITÓRIA','ENZO','SOPHIA','NICOLY'];if(!doc.exists)await db.collection('config').doc('vendedores').set({lista:vendedoresList});atualizarDatalist()}
async function salvarVendedoresNoFirestore(){await db.collection('config').doc('vendedores').set({lista:vendedoresList},{merge:true})}
function iniciarOuvinteFechamentos(){db.collection('fechamentos').onSnapshot((snapshot)=>{fechamentos=[];snapshot.forEach(doc=>fechamentos.push({id:doc.id,...doc.data()}));renderAll()})}
function setupUI(){document.getElementById('btnMenuToggle').addEventListener('click',()=>{document.getElementById('sidebar').classList.toggle('collapsed');document.getElementById('mainArea').classList.toggle('expanded')});document.querySelectorAll('.nav-item').forEach(item=>{item.addEventListener('click',function(){navigateTo(this.dataset.page)})});document.getElementById('modalOverlay').addEventListener('click',function(e){if(e.target===this)closeModal()});updateDate();navigateTo('dashboard')}
function updateDate(){document.getElementById('currentDate').textContent=new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}
function navigateTo(page){document.querySelectorAll('.nav-item').forEach(i=>i.classList.toggle('active',i.dataset.page===page));document.getElementById('pageTitle').textContent={dashboard:'Dashboard',fechamentos:'Gestão de Fechamentos',mensal:'Relatório Mensal',vendedoras:'Desempenho dos Vendedores',usuarios:'Gerenciar Usuários'}[page]||page;renderPage(page)}
function renderPage(page){currentPage=page;const a=document.getElementById('contentArea');switch(page){case'dashboard':a.innerHTML=renderDashboard();break;case'fechamentos':a.innerHTML=renderFechamentos();setupFiltros();break;case'mensal':a.innerHTML=renderMensal();break;case'vendedoras':a.innerHTML=renderVendedoras();break;case'usuarios':a.innerHTML=renderUsuarios();setupUsuarios();break}}
function renderAll(){renderPage(currentPage);document.getElementById('navCount').textContent=fechamentos.length}

function renderDashboard(){const pagos=fechamentos.filter(f=>f.status==='Pago e Assinado'),assinados=fechamentos.filter(f=>f.status==='Apenas Assinado'),cancelados=fechamentos.filter(f=>f.status==='Cancelado');const vt=fechamentos.reduce((s,f)=>s+(f.valor||0),0);const recentes=[...fechamentos].sort((a,b)=>(b.data+b.horario).localeCompare(a.data+a.horario)).slice(0,8);return`<div class="kpi-row"><div class="kpi-card primary"><div class="kpi-icon-container"><i class="fas fa-handshake"></i></div><div class="kpi-label">Total</div><div class="kpi-value">${fechamentos.length}</div></div><div class="kpi-card emerald"><div class="kpi-icon-container"><i class="fas fa-check-double"></i></div><div class="kpi-label">Pagos</div><div class="kpi-value">${pagos.length}</div></div><div class="kpi-card accent"><div class="kpi-icon-container"><i class="fas fa-signature"></i></div><div class="kpi-label">Assinados</div><div class="kpi-value">${assinados.length}</div></div><div class="kpi-card rose"><div class="kpi-icon-container"><i class="fas fa-times-circle"></i></div><div class="kpi-label">Cancelados</div><div class="kpi-value">${cancelados.length}</div></div><div class="kpi-card primary"><div class="kpi-icon-container"><i class="fas fa-dollar-sign"></i></div><div class="kpi-label">Valor Total</div><div class="kpi-value small">R$ ${vt.toFixed(2)}</div></div></div><div class="panel"><div class="panel-header"><h4><i class="fas fa-clock-rotate-left"></i> Últimos Registros</h4></div><div class="table-wrapper"><table><thead><tr><th>Data</th><th>Vendedor</th><th>Cliente</th><th>Marca</th><th>Status</th><th>Valor</th></tr></thead><tbody>${recentes.map(f=>`<tr><td>${fmtDate(f.data)}</td><td>${f.vendedora}</td><td>${f.cliente}</td><td>${f.marca}</td><td>${badge(f.status)}</td><td class="${colorClass(f.status)}">R$ ${(f.valor||0).toFixed(2)}</td></tr>`).join('')||'<tr><td colspan="6" style="text-align:center;padding:40px">Nenhum registro</td></tr>'}</tbody></table></div></div>`}
function renderFechamentos(){return`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px"><h3>Gestão de Fechamentos</h3><button class="btn btn-primary" onclick="openModal()"><i class="fas fa-plus"></i> Novo</button></div><div class="totals-row"><div class="total-box emerald"><h5><i class="fas fa-check-circle"></i> Pagos</h5><div class="big-value" id="totalPagosValor">R$ 0</div><div class="total-sub" id="totalPagosQtd">0</div></div><div class="total-box accent"><h5><i class="fas fa-clock"></i> Assinados</h5><div class="big-value" id="totalAssinadosValor">R$ 0</div><div class="total-sub" id="totalAssinadosQtd">0</div></div><div class="total-box danger"><h5><i class="fas fa-times-circle"></i> Cancelados</h5><div class="big-value" id="totalCanceladosValor">R$ 0</div><div class="total-sub" id="totalCanceladosQtd">0</div></div></div><div class="filter-bar"><div class="filter-group"><label>Início</label><input type="date" class="filter-input" id="filtroDataInicio"></div><div class="filter-group"><label>Fim</label><input type="date" class="filter-input" id="filtroDataFim"></div><div class="filter-group"><label>Vendedor</label><select class="filter-input" id="filtroVendedora"><option value="">Todos</option>${vendedoresList.map(v=>`<option value="${v}">${v}</option>`).join('')}</select></div><div class="filter-group"><label>Status</label><select class="filter-input" id="filtroStatus"><option value="">Todos</option><option value="Pago e Assinado">Pago e Assinado</option><option value="Apenas Assinado">Apenas Assinado</option><option value="Cancelado">Cancelado</option></select></div><button class="btn btn-outline" onclick="clearFilters()"><i class="fas fa-times"></i> Limpar</button></div><div class="panel"><div class="table-wrapper"><table><thead><tr><th>Data</th><th>Vendedor</th><th>Horário</th><th>Cliente</th><th>Marca</th><th>Status</th><th>Valor</th><th>Ações</th></tr></thead><tbody id="tabelaFechamentos"></tbody></table></div><div style="padding:14px 24px;color:var(--text-tertiary)" id="registrosInfo">0 registros</div></div>`}
function setupFiltros(){['filtroDataInicio','filtroDataFim','filtroVendedora','filtroStatus'].forEach(id=>{const el=document.getElementById(id);if(el)el.addEventListener('change',aplicarFiltros)});aplicarFiltros()}
function aplicarFiltros(){const di=document.getElementById('filtroDataInicio')?.value||'',df=document.getElementById('filtroDataFim')?.value||'',v=document.getElementById('filtroVendedora')?.value||'',s=document.getElementById('filtroStatus')?.value||'';let f=[...fechamentos];if(di)f=f.filter(x=>x.data>=di);if(df)f=f.filter(x=>x.data<=df);if(v)f=f.filter(x=>x.vendedora===v);if(s)f=f.filter(x=>x.status===s);f.sort((a,b)=>(b.data+b.horario).localeCompare(a.data+a.horario));const pagos=f.filter(x=>x.status==='Pago e Assinado'),assinados=f.filter(x=>x.status==='Apenas Assinado'),cancelados=f.filter(x=>x.status==='Cancelado');document.getElementById('totalPagosValor').textContent=`R$ ${pagos.reduce((s,x)=>s+x.valor,0).toFixed(2)}`;document.getElementById('totalPagosQtd').textContent=`${pagos.length} contratos`;document.getElementById('totalAssinadosValor').textContent=`R$ ${assinados.reduce((s,x)=>s+x.valor,0).toFixed(2)}`;document.getElementById('totalAssinadosQtd').textContent=`${assinados.length} contratos`;document.getElementById('totalCanceladosValor').textContent=`R$ ${cancelados.reduce((s,x)=>s+x.valor,0).toFixed(2)}`;document.getElementById('totalCanceladosQtd').textContent=`${cancelados.length} contratos`;const tbody=document.getElementById('tabelaFechamentos');if(tbody)tbody.innerHTML=f.map(x=>`<tr><td>${fmtDate(x.data)}</td><td>${x.vendedora}</td><td>${x.horario}</td><td>${x.cliente}</td><td>${x.marca}</td><td>${badge(x.status)}</td><td class="${colorClass(x.status)}">R$ ${(x.valor||0).toFixed(2)}</td><td style="display:flex;gap:4px"><button class="btn btn-outline btn-icon" onclick="openModal('${x.id}')"><i class="fas fa-edit"></i></button><button class="btn btn-outline danger btn-icon" onclick="deleteFechamento('${x.id}')"><i class="fas fa-trash"></i></button></td></tr>`).join('')||'<tr><td colspan="8" style="text-align:center;padding:40px">Nenhum fechamento</td></tr>';const info=document.getElementById('registrosInfo');if(info)info.textContent=`${f.length} registro(s)`}
function clearFilters(){['filtroDataInicio','filtroDataFim','filtroVendedora','filtroStatus'].forEach(id=>{const el=document.getElementById(id);if(el)el.value=''});aplicarFiltros()}
function renderMensal(){const meses={};fechamentos.forEach(f=>{if(!f.data)return;const k=f.data.substring(0,7);if(!meses[k])meses[k]=[];meses[k].push(f)});const ord=Object.entries(meses).sort((a,b)=>b[0].localeCompare(a[0]));if(ord.length===0)return'<div style="text-align:center;padding:60px"><div style="font-size:48px">📁</div><h3>Nenhum mês</h3></div>';return`<h2 style="font-size:20px;font-weight:700;margin-bottom:20px">📅 Relatório Mensal</h2><div class="folder-grid">${ord.map(([mes,it])=>{const[ano,mn]=mes.split('-'),nome=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'][parseInt(mn)-1];const pagos=it.filter(f=>f.status==='Pago e Assinado'),assinados=it.filter(f=>f.status==='Apenas Assinado'),cancelados=it.filter(f=>f.status==='Cancelado'),val=it.reduce((s,f)=>s+(f.valor||0),0);return`<div class="folder-card" style="position:relative"><div onclick="openMesDetalhe('${mes}')"><div class="folder-icon">📁</div><h4>${nome} ${ano}</h4><div style="font-size:10px;color:var(--text-tertiary)">${it.length} fechamentos</div><div style="font-size:16px;font-weight:800;color:var(--emerald)">R$ ${val.toFixed(2)}</div><div style="font-size:9px"><span style="color:var(--emerald)">${pagos.length} pagos</span> · <span style="color:var(--accent)">${assinados.length} assinados</span> · <span style="color:var(--red)">${cancelados.length} cancelados</span></div></div><div style="display:flex;gap:6px;margin-top:10px"><button class="btn btn-outline btn-sm" style="flex:1" onclick="imprimirRelatorio('${mes}')"><i class="fas fa-print"></i> Imprimir</button><button class="btn btn-outline danger btn-sm" style="flex:1" onclick="excluirMes('${mes}')"><i class="fas fa-trash"></i> Excluir</button></div></div>`}).join('')}</div>`}
window.excluirMes=async function(mes){const items=fechamentos.filter(f=>f.data&&f.data.startsWith(mes));const[ano,mn]=mes.split('-');const nome=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'][parseInt(mn)-1];if(items.length===0){showToast('Nenhum fechamento!','error');return}if(!confirm(`⚠️ Excluir TODOS os ${items.length} fechamentos de ${nome} ${ano}?\nValor total: R$ ${items.reduce((s,f)=>s+(f.valor||0),0).toFixed(2)}`))return;if(!confirm('Tem certeza ABSOLUTA?'))return;const c=prompt(`Digite "EXCLUIR" para apagar ${nome} ${ano}:`);if(c!=='EXCLUIR'){showToast('Cancelado!','error');return}let b=db.batch(),ex=0;for(const f of items){b.delete(db.collection('fechamentos').doc(f.id));ex++;if(ex%400===0){await b.commit();b=db.batch()}}if(ex%400!==0)await b.commit();showToast(`${ex} excluídos!`,'success')}
window.openMesDetalhe=function(mes){const items=fechamentos.filter(f=>f.data&&f.data.startsWith(mes));const[ano,mn]=mes.split('-'),nome=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'][parseInt(mn)-1];const pagos=items.filter(f=>f.status==='Pago e Assinado'),assinados=items.filter(f=>f.status==='Apenas Assinado'),cancelados=items.filter(f=>f.status==='Cancelado');const overlay=document.createElement('div');overlay.className='modal-overlay show';overlay.innerHTML=`<div class="modal wide" onclick="event.stopPropagation()"><div class="modal-header"><h4>📁 ${nome} ${ano}</h4><button class="btn-close" onclick="this.closest('.modal-overlay').remove()">✕</button></div><div style="padding:24px"><div class="totals-row"><div class="total-box emerald"><h5>Pagos</h5><div class="big-value">R$ ${pagos.reduce((s,f)=>s+f.valor,0).toFixed(2)}</div><div class="total-sub">${pagos.length} contratos</div></div><div class="total-box accent"><h5>Assinados</h5><div class="big-value">R$ ${assinados.reduce((s,f)=>s+f.valor,0).toFixed(2)}</div><div class="total-sub">${assinados.length} contratos</div></div><div class="total-box danger"><h5>Cancelados</h5><div class="big-value">R$ ${cancelados.reduce((s,f)=>s+f.valor,0).toFixed(2)}</div><div class="total-sub">${cancelados.length} contratos</div></div></div><div class="table-wrapper"><table><thead><tr><th>Data</th><th>Vendedor</th><th>Cliente</th><th>Marca</th><th>Status</th><th>Valor</th></tr></thead><tbody>${items.map(f=>`<tr><td>${fmtDate(f.data)}</td><td>${f.vendedora}</td><td>${f.cliente}</td><td>${f.marca}</td><td>${badge(f.status)}</td><td class="${colorClass(f.status)}">R$ ${(f.valor||0).toFixed(2)}</td></tr>`).join('')}</tbody></table></div></div></div>`;overlay.addEventListener('click',function(e){if(e.target===this)this.remove()});document.body.appendChild(overlay)}
window.imprimirRelatorio=function(mes){const items=fechamentos.filter(f=>f.data&&f.data.startsWith(mes));const[ano,mn]=mes.split('-'),nome=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'][parseInt(mn)-1];const pagos=items.filter(f=>f.status==='Pago e Assinado'),assinados=items.filter(f=>f.status==='Apenas Assinado'),cancelados=items.filter(f=>f.status==='Cancelado');const vt=items.reduce((s,f)=>s+(f.valor||0),0);const janela=window.open('','_blank','width=900,height=700');janela.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Relatório ${nome} ${ano} - ControlePro</title><style>*{margin:0;padding:0}body{font-family:Arial,sans-serif;padding:30px;color:#1a1a2e}.header{text-align:center;border-bottom:3px solid #4f46e5;padding-bottom:16px;margin-bottom:24px}.header h1{font-size:24px}.header span{color:#4f46e5}.header p{font-size:12px;color:#666}.resumo{display:flex;justify-content:space-around;background:#f8f9fa;border-radius:10px;padding:18px;margin-bottom:24px}.resumo-item{text-align:center}.resumo-item .v{font-size:22px;font-weight:800}.resumo-item .l{font-size:10px;color:#666}table{width:100%;border-collapse:collapse;margin-top:16px}th{background:#4f46e5;color:#fff;padding:10px;text-align:left;font-size:10px}td{padding:8px;border-bottom:1px solid #ddd;font-size:11px}tr:nth-child(even){background:#f8f9fa}.footer{text-align:center;margin-top:24px;padding-top:12px;border-top:1px solid #ddd;font-size:10px;color:#999}@media print{body{padding:15px}}</style></head><body><div class="header"><h1>Controle<span>Pro</span></h1><p>Relatório Mensal - ${nome} ${ano} | Emitido em ${new Date().toLocaleDateString('pt-BR')}</p></div><div class="resumo"><div class="resumo-item"><div class="v">${items.length}</div><div class="l">Total</div></div><div class="resumo-item"><div class="v" style="color:#059669">R$ ${vt.toFixed(2)}</div><div class="l">Valor Total</div></div><div class="resumo-item"><div class="v">${pagos.length}</div><div class="l">Pagos (R$ ${pagos.reduce((s,f)=>s+f.valor,0).toFixed(2)})</div></div><div class="resumo-item"><div class="v">${assinados.length}</div><div class="l">Assinados (R$ ${assinados.reduce((s,f)=>s+f.valor,0).toFixed(2)})</div></div><div class="resumo-item"><div class="v" style="color:#dc2626">${cancelados.length}</div><div class="l">Cancelados (R$ ${cancelados.reduce((s,f)=>s+f.valor,0).toFixed(2)})</div></div></div><table><thead><tr><th>Data</th><th>Vendedor</th><th>Cliente</th><th>Marca</th><th>Status</th><th>Valor</th></tr></thead><tbody>${items.map(f=>`<tr><td>${fmtDate(f.data)}</td><td>${f.vendedora}</td><td>${f.cliente}</td><td>${f.marca}</td><td>${f.status}</td><td>R$ ${(f.valor||0).toFixed(2)}</td></tr>`).join('')}</tbody></table><div class="footer"><p>ControlePro • Sistema Executivo de Fechamento</p></div><script>window.onload=function(){window.print()}<\/script></body></html>`);janela.document.close()}
function renderVendedoras(){const stats={};const avatarClasses=['indigo','violet','emerald','cyan','blue','rose'];vendedoresList.forEach(v=>{stats[v]={total:0,pagos:0,assinados:0,cancelados:0,valorPagos:0,valorAssinados:0,valorCancelados:0}});fechamentos.forEach(f=>{if(!stats[f.vendedora])stats[f.vendedora]={total:0,pagos:0,assinados:0,cancelados:0,valorPagos:0,valorAssinados:0,valorCancelados:0};stats[f.vendedora].total++;if(f.status==='Pago e Assinado'){stats[f.vendedora].pagos++;stats[f.vendedora].valorPagos+=f.valor}else if(f.status==='Apenas Assinado'){stats[f.vendedora].assinados++;stats[f.vendedora].valorAssinados+=f.valor}else{stats[f.vendedora].cancelados++;stats[f.vendedora].valorCancelados+=f.valor}});const container=document.getElementById('vendedorasGrid');if(container)container.innerHTML=vendedoresList.map((nome,i)=>{const s=stats[nome]||{total:0,pagos:0,assinados:0,cancelados:0,valorPagos:0,valorAssinados:0,valorCancelados:0};return`<div class="vendedor-card"><div class="vendedor-header"><div class="vendedor-avatar ${avatarClasses[i%avatarClasses.length]}">${nome.charAt(0)}</div><div><div class="vendedor-name-editable" onclick="editarNomeVendedor('${nome}')">${nome} <i class="fas fa-pen"></i></div><div style="font-size:11px;color:var(--text-tertiary)">${s.total} fechamentos</div></div></div><div class="vendedor-stats"><div class="stat-mini emerald"><div class="stat-number">${s.pagos}</div><div class="stat-label">Pagos</div><div class="stat-value">R$ ${s.valorPagos.toFixed(2)}</div></div><div class="stat-mini accent"><div class="stat-number">${s.assinados}</div><div class="stat-label">Assinados</div><div class="stat-value">R$ ${s.valorAssinados.toFixed(2)}</div></div><div class="stat-mini danger"><div class="stat-number">${s.cancelados}</div><div class="stat-label">Cancelados</div><div class="stat-value">R$ ${s.valorCancelados.toFixed(2)}</div></div></div><div class="vendedor-total"><div class="total-number">R$ ${(s.valorPagos+s.valorAssinados+s.valorCancelados).toFixed(2)}</div><div class="stat-label">Total Geral</div></div></div>`}).join('')||'<div style="grid-column:1/-1;text-align:center;padding:40px">Nenhum vendedor</div>'}
window.editarNomeVendedor=function(nome){document.getElementById('modalEditVendedor').classList.add('show');document.getElementById('editVendedorOldName').value=nome;document.getElementById('editVendedorNewName').value=nome}
window.closeVendedorEdit=function(){document.getElementById('modalEditVendedor').classList.remove('show')}
window.salvarNomeVendedor=async function(){const oldName=document.getElementById('editVendedorOldName').value.trim().toUpperCase();const newName=document.getElementById('editVendedorNewName').value.trim().toUpperCase();if(!newName)return showToast('Nome obrigatório!','error');if(vendedoresList.includes(newName)&&oldName!==newName)return showToast('Já existe!','error');const idx=vendedoresList.indexOf(oldName);if(idx>=0)vendedoresList[idx]=newName;await salvarVendedoresNoFirestore();const batch=db.batch();const snapshot=await db.collection('fechamentos').where('vendedora','==',oldName).get();snapshot.forEach(doc=>{batch.update(doc.ref,{vendedora:newName})});await batch.commit();closeVendedorEdit();atualizarDatalist();showToast('Vendedor atualizado!','success')}
window.removerVendedor=async function(){const nome=document.getElementById('editVendedorOldName').value.trim().toUpperCase();if(!confirm(`Remover ${nome} e todos os fechamentos?`))return;vendedoresList=vendedoresList.filter(v=>v!==nome);await salvarVendedoresNoFirestore();const batch=db.batch();const snapshot=await db.collection('fechamentos').where('vendedora','==',nome).get();snapshot.forEach(doc=>{batch.delete(doc.ref)});await batch.commit();closeVendedorEdit();showToast('Vendedor removido!','success')}
window.adicionarNovoVendedor=function(){document.getElementById('modalNovoVendedor').classList.add('show');document.getElementById('novoVendedorNome').value=''}
window.closeNovoVendedor=function(){document.getElementById('modalNovoVendedor').classList.remove('show')}
window.criarNovoVendedor=async function(){const nome=document.getElementById('novoVendedorNome').value.trim().toUpperCase();if(!nome)return showToast('Nome obrigatório!','error');if(vendedoresList.includes(nome))return showToast('Já existe!','error');vendedoresList.push(nome);await salvarVendedoresNoFirestore();closeNovoVendedor();atualizarDatalist();showToast('Vendedor adicionado!','success')}
function atualizarDatalist(){const dl=document.getElementById('vendedoresList');if(dl)dl.innerHTML=vendedoresList.map(v=>`<option value="${v}">`).join('')}
function renderUsuarios(){if(userData.role!=='admin')return'<div style="text-align:center;padding:60px"><h3>🔒 Acesso restrito ao administrador</h3></div>';return`<h2 style="font-size:20px;margin-bottom:20px">👥 Gerenciar Usuários</h2><div class="panel"><div class="table-wrapper"><table><thead><tr><th>Nome</th><th>Email</th><th>Status</th><th>Cadastro</th><th>Último Acesso</th><th>Ações</th></tr></thead><tbody id="tabelaUsuarios"></tbody></table></div></div>`}
async function setupUsuarios(){if(userData.role!=='admin')return;const s=await db.collection('usuarios').orderBy('criadoEm','desc').get();const t=document.getElementById('tabelaUsuarios');t.innerHTML=s.docs.map(d=>{const u=d.data();return`<tr><td><strong>${u.nome||'-'}</strong></td><td>${u.email}</td><td><span class="badge ${u.ativo!==false?'success':'danger'}">${u.ativo!==false?'Ativo':'Inativo'}</span></td><td>${u.criadoEm?new Date(u.criadoEm.toDate()).toLocaleDateString('pt-BR'):'-'}</td><td>${u.ultimoAcesso?new Date(u.ultimoAcesso.toDate()).toLocaleString('pt-BR'):'-'}</td><td><button class="btn btn-outline btn-sm" onclick="toggleUsuario('${d.id}',${u.ativo!==false})">${u.ativo!==false?'🔒 Bloquear':'🔓 Ativar'}</button></td></tr>`}).join('')||'<tr><td colspan="6" style="text-align:center;padding:40px">Nenhum usuário</td></tr>'}
window.toggleUsuario=async function(uid,ativo){if(!confirm(`${ativo?'Bloquear':'Ativar'}?`))return;await db.collection('usuarios').doc(uid).update({ativo:!ativo});setupUsuarios();showToast('Usuário atualizado!','success')}
window.openModal=function(id=null){editandoId=id;document.getElementById('formFechamento').reset();if(id){document.getElementById('modalTitle').textContent='Editar Fechamento';const f=fechamentos.find(x=>x.id===id);if(f){document.getElementById('inputData').value=f.data;document.getElementById('inputHorario').value=f.horario;document.getElementById('inputVendedora').value=f.vendedora;document.getElementById('inputCliente').value=f.cliente;document.getElementById('inputMarca').value=f.marca;document.getElementById('inputValor').value=f.valor;document.getElementById('inputStatus').value=f.status}}else{document.getElementById('modalTitle').textContent='Novo Fechamento';document.getElementById('inputData').value=new Date().toISOString().split('T')[0];document.getElementById('inputHorario').value=new Date().toTimeString().slice(0,5)}document.getElementById('modalOverlay').classList.add('show')}
window.closeModal=function(){document.getElementById('modalOverlay').classList.remove('show');editandoId=null}
window.salvarFechamento=async function(e){e.preventDefault();const dados={data:document.getElementById('inputData').value,horario:document.getElementById('inputHorario').value,vendedora:document.getElementById('inputVendedora').value.trim().toUpperCase(),cliente:document.getElementById('inputCliente').value.trim().toUpperCase(),marca:document.getElementById('inputMarca').value.trim(),status:document.getElementById('inputStatus').value,valor:parseFloat(document.getElementById('inputValor').value)};if(!dados.data||!dados.vendedora||!dados.cliente||!dados.marca||!dados.status||isNaN(dados.valor)){showToast('Preencha todos os campos!','error');return}try{if(editandoId){await db.collection('fechamentos').doc(editandoId).update(dados);showToast('Atualizado!','success')}else{await db.collection('fechamentos').add(dados);showToast('Criado!','success')}closeModal()}catch(error){showToast('Erro ao salvar!','error')}}
window.editFechamento=function(id){openModal(id)}
window.deleteFechamento=async function(id){const f=fechamentos.find(x=>x.id===id);if(f&&confirm(`Excluir ${f.cliente}?`)){await db.collection('fechamentos').doc(id).delete();showToast('Excluído!','success')}}
window.fazerBackup=function(){const json=JSON.stringify({fechamentos,vendedoresList,exportadoEm:new Date().toISOString()},null,2);const blob=new Blob([json],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`backup_${new Date().toISOString().split('T')[0]}.json`;a.click();showToast('Backup baixado!','success')}
window.restaurarBackup=function(){document.getElementById('restoreFileInput').click()}
window.handleRestoreFile=async function(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=async function(ev){try{const d=JSON.parse(ev.target.result);const cli=d.fechamentos||d.data||[];if(!Array.isArray(cli)||cli.length===0){alert('Arquivo inválido!');return}if(!confirm(`Importar ${cli.length} fechamentos?`))return;if(d.vendedores)await db.collection('config').doc('vendedores').set({lista:d.vendedores});let imp=0;for(const c of cli){try{await db.collection('fechamentos').add({data:c.data||'',horario:c.horario||'00:00',vendedora:(c.vendedora||'').toUpperCase(),cliente:(c.cliente||'').toUpperCase(),marca:c.marca||'',status:c.status||'Apenas Assinado',valor:parseFloat(c.valor)||0});imp++}catch(err){console.error(err)}}showToast(`${imp} importados!`,'success')}catch(err){alert('Erro: '+err.message)}};r.readAsText(f);e.target.value=''}
window.exportarExcel=function(){if(fechamentos.length===0){showToast('Sem dados!','error');return}let csv='\uFEFFData;Vendedora;Horário;Cliente;Marca;Status;Valor\n';fechamentos.forEach(f=>{csv+=`${fmtDate(f.data)};${f.vendedora};${f.horario};${f.cliente};${f.marca};${f.status};R$ ${f.valor.toFixed(2)}\n`});const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`fechamentos_${new Date().toISOString().split('T')[0]}.csv`;a.click()}
function fmtDate(d){const[y,m,day]=d.split('-');return`${day}/${m}/${y}`}
function badge(s){if(s==='Pago e Assinado')return'<span class="badge success">Pago e Assinado</span>';if(s==='Apenas Assinado')return'<span class="badge warning">Apenas Assinado</span>';return'<span class="badge danger">Cancelado</span>'}
function colorClass(s){if(s==='Pago e Assinado')return'text-success';if(s==='Apenas Assinado')return'text-warning';return'text-danger'}
function showToast(msg,type){const t=document.createElement('div');t.className=`toast ${type}`;t.innerHTML=`<i class="fas fa-${type==='success'?'check-circle':'times-circle'}"></i> ${msg}`;document.body.appendChild(t);setTimeout(()=>t.remove(),3000)}
async function logout(){await auth.signOut();window.location.href='index.html'}
document.addEventListener('keydown',(e)=>{if(e.key==='Escape'){closeModal();closeVendedorEdit();closeNovoVendedor()}})
</script>
