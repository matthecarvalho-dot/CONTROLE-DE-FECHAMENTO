<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ControlePro | Sistema Executivo</title>
    <link rel="icon" href="logo.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --bg: #030712; --bg2: #0a0f1e; --bg3: #111827; --glass: rgba(17,24,39,0.6);
            --primary: #4f46e5; --primary-light: #818cf8; --secondary: #7c3aed;
            --accent: #06b6d4; --emerald: #10b981; --red: #ef4444;
            --text: #f1f5f9; --text2: #94a3b8; --text3: #64748b;
            --border: rgba(255,255,255,0.05); --border-light: rgba(255,255,255,0.08);
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
        body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% -20%,rgba(79,70,229,0.08) 0%,transparent 100%),radial-gradient(ellipse 60% 40% at 80% 80%,rgba(6,182,212,0.05) 0%,transparent 100%);pointer-events:none;z-index:0}
        .app{position:relative;z-index:1;display:flex;min-height:100vh}

        .sidebar{width:260px;min-width:260px;background:var(--bg2);border-right:1px solid var(--border);position:fixed;top:0;left:0;height:100vh;z-index:100;display:flex;flex-direction:column;transition:all 0.3s}
        .sidebar.collapsed{width:72px;min-width:72px}
        .side-brand{padding:24px 20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border)}
        .side-logo{width:42px;height:42px;background:linear-gradient(135deg,var(--primary),var(--secondary));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#fff}
        .sidebar.collapsed .side-brand-text{display:none}
        .side-name{font-size:17px;font-weight:700}
        .side-name span{background:linear-gradient(135deg,var(--primary-light),var(--secondary));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .side-badge{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:2px;color:var(--text3)}
        .side-nav{flex:1;padding:16px 12px;display:flex;flex-direction:column;gap:4px;overflow-y:auto}
        .nav-section{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--text3);padding:12px 16px 8px}
        .sidebar.collapsed .nav-section{display:none}
        .nav-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:10px;border:none;background:transparent;color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;transition:all 0.3s;font-family:inherit;width:100%;text-align:left;position:relative}
        .nav-item:hover{background:rgba(255,255,255,0.03);color:var(--text)}
        .nav-item.active{background:linear-gradient(135deg,rgba(79,70,229,0.12),rgba(124,58,237,0.06));color:var(--primary-light);font-weight:600;box-shadow:inset 0 0 0 1px rgba(79,70,229,0.2)}
        .nav-item.active::before{content:'';position:absolute;left:0;top:8px;bottom:8px;width:3px;background:linear-gradient(180deg,var(--primary),var(--secondary));border-radius:0 4px 4px 0}
        .nav-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px}
        .nav-item.active .nav-icon{background:rgba(79,70,229,0.15);color:var(--primary-light)}
        .nav-badge{margin-left:auto;background:rgba(255,255,255,0.05);padding:2px 10px;border-radius:12px;font-size:10px;font-weight:700;font-family:'JetBrains Mono',monospace}
        .nav-item.active .nav-badge{background:var(--primary);color:#fff}
        .sidebar.collapsed .nav-label,.sidebar.collapsed .nav-badge{display:none}
        .side-footer{padding:16px;border-top:1px solid var(--border);display:flex;align-items:center;gap:12px}
        .user-avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--secondary));display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:14px}
        .user-info{overflow:hidden;flex:1}.sidebar.collapsed .user-info{display:none}
        .user-name-display{font-size:13px;font-weight:600}.user-role-display{font-size:10px;color:var(--text3)}
        .btn-logout{width:28px;height:28px;border-radius:50%;border:1px solid rgba(255,255,255,0.1);background:transparent;color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center}
        .btn-logout:hover{border-color:var(--red);color:var(--red)}

        .main{flex:1;margin-left:260px;transition:all 0.3s;min-height:100vh;width:calc(100% - 260px)}
        .main.expanded{margin-left:72px;width:calc(100% - 72px)}
        .topbar{background:rgba(10,15,30,0.7);backdrop-filter:blur(30px);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:50;flex-wrap:wrap;gap:10px}
        .btn-menu{width:38px;height:38px;border-radius:10px;border:1px solid var(--border-light);background:rgba(255,255,255,0.02);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px}
        .btn-menu:hover{border-color:var(--primary);color:var(--primary-light)}
        .top-actions{display:flex;gap:8px;flex-wrap:wrap}
        .content{padding:28px}
        .page{display:none;animation:fadeIn 0.4s ease}.page.active{display:block}
        @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

        .kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:24px}
        .kpi-card{background:var(--glass);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:16px;padding:20px;position:relative;overflow:hidden;transition:all 0.3s}
        .kpi-card:hover{transform:translateY(-2px)}
        .kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
        .kpi-card.p::before{background:linear-gradient(90deg,var(--primary),var(--primary-light))}
        .kpi-card.e::before{background:linear-gradient(90deg,var(--emerald),#34d399)}
        .kpi-card.a::before{background:linear-gradient(90deg,var(--accent),#22d3ee)}
        .kpi-card.r::before{background:linear-gradient(90deg,#f43f5e,#fb7185)}
        .kpi-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;margin-bottom:12px}
        .kpi-card.p .kpi-icon{background:rgba(79,70,229,0.12);color:var(--primary-light)}
        .kpi-card.e .kpi-icon{background:rgba(16,185,129,0.12);color:var(--emerald)}
        .kpi-card.a .kpi-icon{background:rgba(6,182,212,0.12);color:var(--accent)}
        .kpi-card.r .kpi-icon{background:rgba(244,63,94,0.12);color:#fb7185}
        .kpi-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--text3);margin-bottom:6px}
        .kpi-value{font-size:28px;font-weight:800;letter-spacing:-1px;font-family:'JetBrains Mono',monospace}
        .kpi-value.sm{font-size:18px}
        .kpi-card.p .kpi-value{color:var(--primary-light)}.kpi-card.e .kpi-value{color:#34d399}
        .kpi-card.a .kpi-value{color:#22d3ee}.kpi-card.r .kpi-value{color:#fff}

        .panel{background:var(--glass);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:20px}
        .panel-header{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
        .panel-header h4{font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px}
        .panel-header h4 i{color:var(--primary-light)}
        .table-wrapper{overflow-x:auto}
        table{width:100%;border-collapse:collapse}
        th{padding:12px 16px;text-align:left;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text3);border-bottom:1px solid var(--border)}
        td{padding:12px 16px;border-bottom:1px solid rgba(255,255,255,0.03);font-size:12px;color:var(--text2)}
        tbody tr:hover{background:rgba(79,70,229,0.03)}

        .badge{padding:4px 10px;border-radius:20px;font-size:9px;font-weight:700;display:inline-flex;align-items:center;gap:5px}
        .badge::before{content:'';width:5px;height:5px;border-radius:50%}
        .badge.success{background:rgba(16,185,129,0.12);color:var(--emerald);border:1px solid rgba(16,185,129,0.2)}.badge.success::before{background:var(--emerald)}
        .badge.warning{background:rgba(6,182,212,0.12);color:var(--accent);border:1px solid rgba(6,182,212,0.2)}.badge.warning::before{background:var(--accent)}
        .badge.danger{background:rgba(239,68,68,0.12);color:var(--red);border:1px solid rgba(239,68,68,0.2)}.badge.danger::before{background:var(--red)}
        .text-success{color:var(--emerald);font-weight:700}.text-warning{color:var(--accent);font-weight:600}.text-danger{color:var(--red);font-weight:700}

        .btn{padding:9px 18px;border:none;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.3s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
        .btn-primary{background:linear-gradient(135deg,var(--primary),var(--secondary));color:#fff;box-shadow:0 4px 15px rgba(79,70,229,0.3)}
        .btn-primary:hover{transform:translateY(-1px)}
        .btn-outline{background:transparent;border:1px solid var(--border-light);color:var(--text2)}
        .btn-outline:hover{border-color:var(--primary);color:var(--primary-light)}
        .btn-outline.danger:hover{border-color:var(--red);color:var(--red)}
        .btn-icon{width:30px;height:30px;padding:0;border-radius:6px;justify-content:center;font-size:11px}
        .btn-sm{padding:5px 10px;font-size:9px;border-radius:6px}
        .btn-gold{background:linear-gradient(135deg,#f59e0b,#d97706);color:#000;box-shadow:0 4px 15px rgba(245,158,11,0.3)}

        .filter-bar{display:flex;gap:12px;align-items:flex-end;padding:16px 20px;background:var(--glass);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:16px;margin-bottom:20px;flex-wrap:wrap}
        .filter-group{display:flex;flex-direction:column;gap:4px}
        .filter-group label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text3)}
        .filter-input{padding:9px 12px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:11px;font-family:inherit;min-width:130px}
        .filter-input:focus{outline:none;border-color:var(--primary)}select.filter-input{cursor:pointer}

        .totals-row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px}
        .total-box{padding:20px;border-radius:16px;border:1px solid var(--border);background:var(--glass);backdrop-filter:blur(20px);text-align:center}
        .total-box.emerald{border-color:rgba(16,185,129,0.3)}.total-box.emerald h5,.total-box.emerald .big{color:var(--emerald)}
        .total-box.accent{border-color:rgba(6,182,212,0.3)}.total-box.accent h5,.total-box.accent .big{color:var(--accent)}
        .total-box.danger{border-color:rgba(239,68,68,0.3)}.total-box.danger h5,.total-box.danger .big{color:var(--red)}
        .total-box h5{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px}
        .big{font-size:28px;font-weight:800;font-family:'JetBrains Mono',monospace}
        .total-sub{font-size:10px;color:var(--text3);margin-top:6px}

        .vendedor-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
        .v-card{background:var(--glass);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:16px;padding:20px;transition:all 0.3s}
        .v-card:hover{transform:translateY(-2px)}.v-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}
        .v-avatar{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#fff}
        .v-avatar.c1{background:linear-gradient(135deg,var(--primary),var(--primary-light))}
        .v-avatar.c2{background:linear-gradient(135deg,var(--secondary),#a78bfa)}
        .v-avatar.c3{background:linear-gradient(135deg,var(--emerald),#34d399)}
        .v-avatar.c4{background:linear-gradient(135deg,var(--accent),#22d3ee)}
        .v-avatar.c5{background:linear-gradient(135deg,#f43f5e,#fb7185)}
        .v-avatar.c6{background:linear-gradient(135deg,#8b5cf6,#a78bfa)}
        .v-name{font-size:14px;font-weight:700;cursor:pointer;padding:2px 6px;border-radius:4px;border:1px dashed transparent;display:inline-flex;align-items:center;gap:4px}
        .v-name:hover{border-color:rgba(79,70,229,0.3);background:rgba(79,70,229,0.06);color:var(--primary-light)}
        .v-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
        .stat-mini{padding:12px;border-radius:8px;text-align:center}
        .stat-mini.emerald{background:rgba(16,185,129,0.06)}.stat-mini.emerald .sn{color:var(--emerald)}
        .stat-mini.accent{background:rgba(6,182,212,0.06)}.stat-mini.accent .sn{color:var(--accent)}
        .stat-mini.danger{background:rgba(239,68,68,0.06)}.stat-mini.danger .sn{color:var(--red)}
        .sn{font-size:20px;font-weight:800;font-family:'JetBrains Mono',monospace}
        .sl{font-size:8px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-top:3px}
        .sv{font-size:9px;font-weight:600;margin-top:4px}
        .v-total{text-align:center;padding-top:14px;border-top:1px solid var(--border)}
        .v-total .tn{font-size:22px;font-weight:800;color:var(--primary-light)}
        .v-total .tl{font-size:8px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text3)}

        .folder-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
        .folder-card{background:var(--glass);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:16px;padding:20px;cursor:pointer;transition:all 0.3s}
        .folder-card:hover{transform:translateY(-3px);border-color:var(--primary)}
        .folder-icon{font-size:36px;margin-bottom:12px}

        .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);backdrop-filter:blur(10px);z-index:1000;align-items:center;justify-content:center}
        .modal-overlay.show{display:flex}
        .modal{background:var(--bg3);border:1px solid var(--border-light);border-radius:20px;width:90%;max-width:550px;max-height:85vh;overflow-y:auto;animation:modalIn 0.3s ease}
        .modal.wide{max-width:780px}
        @keyframes modalIn{from{opacity:0;transform:scale(0.95) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
        .modal-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
        .btn-close{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer}
        .btn-close:hover{border-color:var(--red);color:var(--red)}
        .modal-body{padding:20px 24px}.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
        .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        .form-group{margin-bottom:14px}.form-group.full{grid-column:1/-1}
        .form-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:6px;display:block}
        .form-input{width:100%;padding:10px 14px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:8px;color:#fff;font-size:13px;font-family:inherit}
        .form-input:focus{outline:none;border-color:var(--primary)}

        .toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:10px;font-weight:600;font-size:12px;z-index:9999;color:#fff;display:flex;align-items:center;gap:8px;animation:slideIn 0.4s ease;backdrop-filter:blur(20px)}
        .toast.success{background:rgba(16,185,129,0.9)}.toast.error{background:rgba(239,68,68,0.9)}
        @keyframes slideIn{from{opacity:0;transform:translateX(100px)}to{opacity:1;transform:translateX(0)}}

        @media(max-width:1400px){.kpi-row{grid-template-columns:repeat(3,1fr)}}
        @media(max-width:1024px){.kpi-row{grid-template-columns:repeat(2,1fr)}.totals-row{grid-template-columns:1fr 1fr}.vendedor-grid{grid-template-columns:1fr}}
        @media(max-width:768px){.sidebar{width:72px;min-width:72px}.sidebar .side-brand-text,.sidebar .nav-label,.sidebar .nav-badge,.sidebar .nav-section,.sidebar .user-info{display:none}.main{margin-left:72px;width:calc(100% - 72px)}.kpi-row{grid-template-columns:1fr}.totals-row{grid-template-columns:1fr}.form-grid{grid-template-columns:1fr}.content{padding:14px}.topbar{padding:10px 14px}}
    </style>
</head>
<body>

<div class="app">
    <aside class="sidebar" id="sidebar">
        <div class="side-brand">
            <div class="side-logo">CP</div>
            <div class="side-brand-text">
                <div class="side-name">Controle<span>Pro</span></div>
                <div class="side-badge">Executive Suite</div>
            </div>
        </div>
        <nav class="side-nav">
            <div class="nav-section">Principal</div>
            <button class="nav-item active" data-page="dashboard"><div class="nav-icon"><i class="fas fa-chart-pie"></i></div><span class="nav-label">Dashboard</span></button>
            <button class="nav-item" data-page="fechamentos"><div class="nav-icon"><i class="fas fa-file-contract"></i></div><span class="nav-label">Fechamentos</span><span class="nav-badge" id="navCount">0</span></button>
            <button class="nav-item" data-page="mensal"><div class="nav-icon"><i class="fas fa-calendar-alt"></i></div><span class="nav-label">Relatório Mensal</span></button>
            <div class="nav-section">Gestão</div>
            <button class="nav-item" data-page="vendedores"><div class="nav-icon"><i class="fas fa-users"></i></div><span class="nav-label">Vendedores</span></button>
            <button class="nav-item" data-page="usuarios" id="navUsuarios" style="display:none"><div class="nav-icon"><i class="fas fa-user-shield"></i></div><span class="nav-label">Usuários</span></button>
        </nav>
        <div class="side-footer">
            <div class="user-avatar" id="userAvatar">U</div>
            <div class="user-info">
                <div class="user-name-display" id="userNameDisplay">Usuário</div>
                <div class="user-role-display" id="userRoleDisplay">Carregando...</div>
            </div>
            <button class="btn-logout" onclick="logout()" title="Sair"><i class="fas fa-sign-out-alt"></i></button>
        </div>
    </aside>

    <div class="main" id="mainArea">
        <header class="topbar">
            <div style="display:flex;align-items:center;gap:14px">
                <button class="btn-menu" id="btnMenuToggle"><i class="fas fa-bars"></i></button>
                <div>
                    <div style="font-size:17px;font-weight:700" id="pageTitle">Dashboard</div>
                </div>
            </div>
            <div class="top-actions">
                <span style="font-size:11px;color:var(--text2);display:flex;align-items:center;gap:6px">
                    <i class="far fa-calendar-alt" style="color:var(--primary-light)"></i>
                    <span id="currentDate"></span>
                </span>
                <button class="btn btn-outline btn-sm" onclick="fazerBackup()" title="Baixar backup">💾 Backup</button>
                <button class="btn btn-outline btn-sm" onclick="restaurarBackup()" title="Restaurar backup">📥 Restaurar</button>
                <button class="btn btn-outline btn-sm" onclick="exportarExcel()" title="Exportar Excel">📊 Excel</button>
            </div>
        </header>

        <div class="content" id="contentArea"></div>
    </div>
</div>

<input type="file" id="restoreFileInput" style="display:none" accept=".json" onchange="handleRestoreFile(event)">

<script>
const firebaseConfig = {
    apiKey: "AIzaSyCPiGXTl0k1Kq4RYEiABZ6tBxScitRhFwM",
    authDomain: "controle-de-fechamento-f8137.firebaseapp.com",
    projectId: "controle-de-fechamento-f8137",
    storageBucket: "controle-de-fechamento-f8137.firebasestorage.app",
    messagingSenderId: "1016803983243",
    appId: "1:1016803983243:web:66f2ad592c824bd847798e"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let currentUser = null;
let userData = null;
let fechamentos = [];
let vendedoresList = [];
let currentPage = 'dashboard';

// ========== AUTH ==========
auth.onAuthStateChanged(async (user) => {
    if (!user) { window.location.href = 'index.html'; return; }
    currentUser = user;
    const userDoc = await db.collection('usuarios').doc(user.uid).get();
    userData = userDoc.exists ? userDoc.data() : { nome: user.email, role: 'user' };
    
    await db.collection('usuarios').doc(user.uid).update({
        ultimoAcesso: firebase.firestore.FieldValue.serverTimestamp()
    }).catch(() => {});
    
    document.getElementById('userNameDisplay').textContent = userData.nome || user.email.split('@')[0];
    document.getElementById('userAvatar').textContent = (userData.nome || user.email)[0].toUpperCase();
    document.getElementById('userRoleDisplay').textContent = userData.role === 'admin' ? 'Administrador' : 'Usuário';
    
    if (userData.role === 'admin') document.getElementById('navUsuarios').style.display = 'flex';
    
    await carregarVendedores();
    setupListeners();
    updateDate();
    navigateTo('dashboard');
});

async function carregarVendedores() {
    const doc = await db.collection('config').doc('vendedores').get();
    vendedoresList = doc.exists ? (doc.data().lista || []) : ['PATRICIA','JULYA','EVELLYN','NATALY','VITÓRIA','ENZO','SOPHIA','NICOLY'];
    if (!doc.exists) await db.collection('config').doc('vendedores').set({ lista: vendedoresList });
}

function setupListeners() {
    db.collection('fechamentos').onSnapshot((snapshot) => {
        fechamentos = [];
        snapshot.forEach(doc => fechamentos.push({ id: doc.id, ...doc.data() }));
        renderCurrentPage();
    });
    
    document.getElementById('btnMenuToggle').addEventListener('click', () => {
        document.getElementById('sidebar').classList.toggle('collapsed');
        document.getElementById('mainArea').classList.toggle('expanded');
    });
    
    document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', function() { navigateTo(this.dataset.page); });
    });
}

function updateDate() {
    document.getElementById('currentDate').textContent = new Date().toLocaleDateString('pt-BR', { day:'numeric', month:'long', year:'numeric' });
}

function navigateTo(page) {
    document.querySelectorAll('.nav-item').forEach(i => i.classList.toggle('active', i.dataset.page === page));
    document.getElementById('pageTitle').textContent = {
        dashboard:'Dashboard', fechamentos:'Gestão de Fechamentos', mensal:'Relatório Mensal',
        vendedores:'Desempenho dos Vendedores', usuarios:'Gerenciar Usuários'
    }[page] || page;
    renderPage(page);
}

function renderPage(page) {
    currentPage = page;
    const area = document.getElementById('contentArea');
    switch(page) {
        case 'dashboard': area.innerHTML = renderDashboard(); break;
        case 'fechamentos': area.innerHTML = renderFechamentos(); setupFiltros(); break;
        case 'mensal': area.innerHTML = renderMensal(); break;
        case 'vendedores': area.innerHTML = renderVendedores(); break;
        case 'usuarios': area.innerHTML = renderUsuarios(); setupUsuarios(); break;
    }
}

function renderCurrentPage() {
    renderPage(currentPage);
    document.getElementById('navCount').textContent = fechamentos.length;
}

            <div class="kpi-card a"><div class="kpi-icon"><i class="fas fa-signature"></i></div><div class="kpi-label">Assinados</div><div class="kpi-value">${assinados.length}</div></div>

            <tbody id="tabelaFechamentos"></tbody></table>
        </div><div style="padding:12px 20px;color:var(--text3);font-size:10px" id="registrosInfo">0 registros</div></div>`;
}

function setupFiltros() {
    ['filtroDataInicio','filtroDataFim','filtroVendedora','filtroStatus'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.addEventListener('change', aplicarFiltros);
    });
    aplicarFiltros();
}

function aplicarFiltros() {
    const di = document.getElementById('filtroDataInicio')?.value || '';
    const df = document.getElementById('filtroDataFim')?.value || '';
    const v = document.getElementById('filtroVendedora')?.value || '';
    const s = document.getElementById('filtroStatus')?.value || '';
    let filtrado = [...fechamentos];
    if (di) filtrado = filtrado.filter(f => f.data >= di);
    if (df) filtrado = filtrado.filter(f => f.data <= df);
    if (v) filtrado = filtrado.filter(f => f.vendedora === v);
    if (s) filtrado = filtrado.filter(f => f.status === s);
    filtrado.sort((a,b) => (b.data+b.horario).localeCompare(a.data+a.horario));
    
    const tbody = document.getElementById('tabelaFechamentos');
    if (tbody) {
        tbody.innerHTML = filtrado.map(f => `
            <tr><td>${fmtDate(f.data)}</td><td>${f.vendedora}</td><td>${f.horario}</td><td>${f.cliente}</td><td>${f.marca}</td>
            <td>${badge(f.status)}</td><td class="${colorClass(f.status)}">R$ ${(f.valor||0).toFixed(2)}</td>
            <td style="display:flex;gap:4px"><button class="btn btn-outline btn-icon" onclick="openModal('${f.id}')"><i class="fas fa-edit"></i></button>
            <button class="btn btn-outline danger btn-icon" onclick="deleteFechamento('${f.id}')"><i class="fas fa-trash"></i></button></td></tr>
        `).join('') || '<tr><td colspan="8" style="text-align:center;padding:40px;color:var(--text3)">Nenhum fechamento encontrado</td></tr>';
    }
    const info = document.getElementById('registrosInfo');
    if (info) info.textContent = `${filtrado.length} registro(s)`;
}

function clearFiltros() {
    ['filtroDataInicio','filtroDataFim','filtroVendedora','filtroStatus'].forEach(id => {
        const el = document.getElementById(id); if (el) el.value = '';
    });
    aplicarFiltros();
}

// ========== RELATÓRIO MENSAL ==========
function renderMensal() {
    const meses = {};
    fechamentos.forEach(f => {
        const key = f.data.substring(0,7);
        if (!meses[key]) meses[key] = [];
        meses[key].push(f);
    });
    const ordenados = Object.entries(meses).sort((a,b) => b[0].localeCompare(a[0]));
    
    if (ordenados.length === 0) return '<div style="text-align:center;padding:60px;color:var(--text3)"><div style="font-size:48px;margin-bottom:12px">📁</div><h3>Nenhum mês encontrado</h3><p>Cadastre fechamentos para gerar relatórios</p></div>';
    
    return `
        <h2 style="font-size:20px;font-weight:700;margin-bottom:20px">📅 Relatório Mensal</h2>
        <div class="folder-grid">
            ${ordenados.map(([mes, items]) => {
                const [ano, mesNum] = mes.split('-');
                const nome = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'][parseInt(mesNum)-1];
                const pagos = items.filter(i => i.status === 'Pago e Assinado');
                const assinados = items.filter(i => i.status === 'Apenas Assinado');
                const cancelados = items.filter(i => i.status === 'Cancelado');
                const total = items.reduce((s,i) => s + (i.valor||0), 0);
                return `
                <div class="folder-card" onclick="openMesDetalhe('${mes}')">
                    <div class="folder-icon">📁</div>
                    <h4 style="font-size:15px;font-weight:700;margin-bottom:4px">${nome} ${ano}</h4>
                    <div style="font-size:10px;color:var(--text3);margin-bottom:6px">${items.length} fechamentos</div>
                    <div style="font-size:16px;font-weight:800;color:var(--emerald)">R$ ${total.toFixed(2)}</div>
                    <div style="font-size:9px;margin-top:4px">
                        <span style="color:var(--emerald)">${pagos.length} pagos</span> ·
                        <span style="color:var(--accent)">${assinados.length} assinados</span> ·
                        <span style="color:var(--red)">${cancelados.length} cancelados</span>
                    </div>
                </div>`;
            }).join('')}
        </div>`;
}

    const [ano, mesNum] = mes.split('-');
    const nome = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'][parseInt(mesNum)-1];
    const pagos = items.filter(i => i.status === 'Pago e Assinado');
    const assinados = items.filter(i => i.status === 'Apenas Assinado');
    const cancelados = items.filter(i => i.status === 'Cancelado');
    
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay show';
    overlay.innerHTML = `
        <div class="modal wide" onclick="event.stopPropagation()">
            <div class="modal-header"><h3>📁 ${nome} ${ano}</h3><button class="btn-close" onclick="this.closest('.modal-overlay').remove()">✕</button></div>
            <div style="padding:20px">
                <div class="totals-row">
                    <div class="total-box emerald"><h5>Pagos</h5><div class="big">R$ ${pagos.reduce((s,i)=>s+i.valor,0).toFixed(2)}</div><div class="total-sub">${pagos.length} contratos</div></div>
                    <div class="total-box accent"><h5>Assinados</h5><div class="big">R$ ${assinados.reduce((s,i)=>s+i.valor,0).toFixed(2)}</div><div class="total-sub">${assinados.length} contratos</div></div>
                    <div class="total-box danger"><h5>Cancelados</h5><div class="big">R$ ${cancelados.reduce((s,i)=>s+i.valor,0).toFixed(2)}</div><div class="total-sub">${cancelados.length} contratos</div></div>
                </div>
                <div class="table-wrapper"><table><thead><tr><th>Data</th><th>Vendedor</th><th>Cliente</th><th>Marca</th><th>Status</th><th>Valor</th></tr></thead>
                <tbody>${items.map(f => `<tr><td>${fmtDate(f.data)}</td><td>${f.vendedora}</td><td>${f.cliente}</td><td>${f.marca}</td><td>${badge(f.status)}</td><td class="${colorClass(f.status)}">R$ ${(f.valor||0).toFixed(2)}</td></tr>`).join('')}</tbody></table></div>
            </div>
        </div>`;
    overlay.addEventListener('click', function(e) { if (e.target === this) this.remove(); });
    document.body.appendChild(overlay);
};

// ========== VENDEDORES ==========
function renderVendedores() {
    const stats = {};
    const cores = ['c1','c2','c3','c4','c5','c6'];
    vendedoresList.forEach(v => { stats[v] = { t:0, p:0, a:0, c:0, vp:0, va:0, vc:0 }; });
    fechamentos.forEach(f => {
        if (!stats[f.vendedora]) stats[f.vendedora] = { t:0, p:0, a:0, c:0, vp:0, va:0, vc:0 };
        stats[f.vendedora].t++;
        if (f.status === 'Pago e Assinado') { stats[f.vendedora].p++; stats[f.vendedora].vp += f.valor; }
        else if (f.status === 'Apenas Assinado') { stats[f.vendedora].a++; stats[f.vendedora].va += f.valor; }
        else { stats[f.vendedora].c++; stats[f.vendedora].vc += f.valor; }
    });
    
    return `
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px">
            <h2 style="font-size:20px;font-weight:700">Desempenho dos Vendedores</h2>
            <button class="btn btn-primary" onclick="novoVendedor()"><i class="fas fa-plus"></i> Novo Vendedor</button>
        </div>
        <div class="vendedor-grid">
            ${vendedoresList.map((nome, i) => {
                const s = stats[nome] || { t:0, p:0, a:0, c:0, vp:0, va:0, vc:0 };
                return `
                <div class="v-card">
                    <div class="v-header">
                        <div class="v-avatar ${cores[i % 6]}">${nome.charAt(0)}</div>
                        <div>
                            <div class="v-name" onclick="editarVendedorPrompt('${nome}')">${nome} <i class="fas fa-pen" style="font-size:8px"></i></div>
                            <div style="font-size:10px;color:var(--text3)">${s.t} fechamentos</div>
                        </div>
                    </div>
                    <div class="v-stats">
                        <div class="stat-mini emerald"><div class="sn">${s.p}</div><div class="sl">Pagos</div><div class="sv">R$ ${s.vp.toFixed(2)}</div></div>
                        <div class="stat-mini accent"><div class="sn">${s.a}</div><div class="sl">Assinados</div><div class="sv">R$ ${s.va.toFixed(2)}</div></div>
                        <div class="stat-mini danger"><div class="sn">${s.c}</div><div class="sl">Cancelados</div><div class="sv">R$ ${s.vc.toFixed(2)}</div></div>
                    </div>
                    <div class="v-total"><div class="tn">R$ ${(s.vp+s.va+s.vc).toFixed(2)}</div><div class="tl">Total Geral</div></div>
                </div>`;
            }).join('') || '<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text3)">Nenhum vendedor cadastrado</div>'}
        </div>`;
}

window.editarVendedorPrompt = function(nome) {
    const novo = prompt('Novo nome:', nome);
    if (!novo || novo.trim().toUpperCase() === nome) return;
    atualizarNomeVendedor(nome, novo.trim().toUpperCase());
};

window.novoVendedor = function() {
    const nome = prompt('Nome do vendedor:');
    if (!nome) return;
    const n = nome.trim().toUpperCase();
    if (vendedoresList.includes(n)) { alert('Já existe!'); return; }
    vendedoresList.push(n);
    db.collection('config').doc('vendedores').set({ lista: vendedoresList });
    renderCurrentPage();
};

async function atualizarNomeVendedor(oldName, newName) {
    if (vendedoresList.includes(newName) && oldName !== newName) { alert('Nome já existe!'); return; }
    const idx = vendedoresList.indexOf(oldName);
    if (idx >= 0) vendedoresList[idx] = newName;
    await db.collection('config').doc('vendedores').set({ lista: vendedoresList });
    const snapshot = await db.collection('fechamentos').where('vendedora', '==', oldName).get();
    const batch = db.batch();
    snapshot.forEach(doc => batch.update(doc.ref, { vendedora: newName }));
    await batch.commit();
    renderCurrentPage();
}

// ========== USUÁRIOS ==========
function renderUsuarios() {
    if (userData.role !== 'admin') return '<div style="text-align:center;padding:60px"><h3>🔒 Acesso restrito ao administrador</h3></div>';
    return `
        <h2 style="font-size:20px;font-weight:700;margin-bottom:20px">👥 Gerenciar Usuários</h2>
        <div class="panel"><div class="table-wrapper">
            <table><thead><tr><th>Nome</th><th>Email</th><th>Whatsapp</th><th>Status</th><th>Cadastro</th><th>Último Acesso</th><th>Ações</th></tr></thead>
            <tbody id="tabelaUsuarios"><tr><td colspan="7" style="text-align:center;padding:40px">Carregando...</td></tr></tbody></table>
        </div></div>`;

async function setupUsuarios() {
    if (userData.role !== 'admin') return;
    const snapshot = await db.collection('usuarios').orderBy('criadoEm', 'desc').get();
    const tbody = document.getElementById('tabelaUsuarios');
    tbody.innerHTML = snapshot.docs.map(doc => {
        const u = doc.data();
        return `
        <tr>
            <td><strong>${u.nome || '-'}</strong></td>
            <td>${u.email}</td>
            <td>${u.whatsapp || '-'}</td>
            <td><span class="badge ${u.ativo !== false ? 'success' : 'danger'}">${u.ativo !== false ? 'Ativo' : 'Inativo'}</span></td>
            <td>${u.criadoEm ? new Date(u.criadoEm.toDate()).toLocaleDateString('pt-BR') : '-'}</td>
            <td>${u.ultimoAcesso ? new Date(u.ultimoAcesso.toDate()).toLocaleString('pt-BR') : '-'}</td>
            <td><button class="btn btn-outline btn-sm" onclick="toggleUsuario('${doc.id}', ${u.ativo !== false})">${u.ativo !== false ? '🔒 Bloquear' : '🔓 Ativar'}</button></td>
        </tr>`;
    }).join('') || '<tr><td colspan="7" style="text-align:center;padding:40px">Nenhum usuário</td></tr>';

window.toggleUsuario = async function(uid, ativo) {
    if (!confirm(`${ativo ? 'Bloquear' : 'Ativar'} este usuário?`)) return;
    await db.collection('usuarios').doc(uid).update({ ativo: !ativo });
    setupUsuarios();
    showToast('Usuário atualizado!', 'success');
};

// ========== MODAL CRUD ==========

                    <button type="button" class="btn btn-outline" onclick="this.closest('.modal-overlay').remove()">Cancelar</button>
                    <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Salvar</button>
                </div>
            </form>
        </div>`;
    modal.addEventListener('click', function(e) { if (e.target === this) this.remove(); });
    document.body.appendChild(modal);
};

window.salvarFechamento = async function(e, id) {
    e.preventDefault();
    const dados = {
        data: document.getElementById('mfData').value,
        horario: document.getElementById('mfHorario').value,
        vendedora: document.getElementById('mfVendedora').value.trim().toUpperCase(),
        cliente: document.getElementById('mfCliente').value.trim().toUpperCase(),
        marca: document.getElementById('mfMarca').value.trim(),
        status: document.getElementById('mfStatus').value,
        valor: parseFloat(document.getElementById('mfValor').value)
    };
    if (!dados.data || !dados.vendedora || !dados.cliente || !dados.marca || isNaN(dados.valor)) { alert('Preencha todos os campos!'); return; }
    if (id) { await db.collection('fechamentos').doc(id).update(dados); }
    else { await db.collection('fechamentos').add(dados); }
    document.querySelector('.modal-overlay')?.remove();
    showToast(id ? 'Atualizado!' : 'Criado!', 'success');
};

window.deleteFechamento = async function(id) {
    const f = fechamentos.find(x => x.id === id);
    if (f && confirm(`Excluir ${f.cliente}?`)) { await db.collection('fechamentos').doc(id).delete(); showToast('Excluído!', 'success'); }
};

// ========== BACKUP / RESTORE / EXCEL ==========
window.fazerBackup = function() {
    const backup = {
        fechamentos: fechamentos.map(f => ({ data: f.data, horario: f.horario, vendedora: f.vendedora, cliente: f.cliente, marca: f.marca, status: f.status, valor: f.valor })),
        vendedores: vendedoresList,
        exportadoEm: new Date().toISOString()
    };
    const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `backup_${new Date().toISOString().split('T')[0]}.json`;
    a.click();
    showToast('Backup baixado com sucesso!', 'success');
};

window.restaurarBackup = function() {
    document.getElementById('restoreFileInput').click();
};

window.handleRestoreFile = async function(event) {
    const file = event.target.files[0];
    if (!file) return;
    
    const reader = new FileReader();
    reader.onload = async function(e) {
        try {
            const dados = JSON.parse(e.target.result);
            const fech = dados.fechamentos || dados.data || [];
            const vend = dados.vendedores || [];
            
            if (!Array.isArray(fech) || fech.length === 0) {
                alert('Arquivo inválido ou vazio!');
                return;
            }
            
            if (!confirm(`Importar ${fech.length} fechamentos e ${vend.length} vendedores?`)) return;
            
            // Importar vendedores
            if (vend.length > 0) {
                await db.collection('config').doc('vendedores').set({ lista: vend });
                vendedoresList = vend;
            }
            
            // Importar fechamentos em lotes
            let importados = 0;
            for (const f of fech) {
                try {
                    await db.collection('fechamentos').add({
                        data: f.data || '',
                        horario: f.horario || '00:00',
                        vendedora: (f.vendedora || '').toUpperCase(),
                        cliente: (f.cliente || '').toUpperCase(),
                        marca: f.marca || '',
                        status: f.status || 'Apenas Assinado',
                        valor: parseFloat(f.valor) || 0
                    });
                    importados++;
                } catch(err) {
                    console.error('Erro ao importar:', f.cliente, err);
                }
            }
            
            showToast(`${importados} fechamentos importados!`, 'success');
        } catch(err) {
            alert('Erro ao ler arquivo: ' + err.message);
        }
    };
    reader.readAsText(file);
    event.target.value = '';
};

window.exportarExcel = function() {
    if (fechamentos.length === 0) { showToast('Sem dados!', 'error'); return; }
    let csv = '\uFEFFData;Vendedora;Horário;Cliente;Marca;Status;Valor\n';
    fechamentos.sort((a,b) => (b.data+b.horario).localeCompare(a.data+a.horario)).forEach(f => {
        csv += `${fmtDate(f.data)};${f.vendedora};${f.horario};${f.cliente};${f.marca};${f.status};R$ ${(f.valor||0).toFixed(2)}\n`;
    });
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `excel_${new Date().toISOString().split('T')[0]}.csv`;
    a.click();
    showToast('Excel exportado!', 'success');
};

// ========== UTILS ==========
function fmtDate(d) { if(!d) return '-'; const [y,m,day] = d.split('-'); return `${day}/${m}/${y}`; }
function badge(s) {
    if (s === 'Pago e Assinado') return '<span class="badge success">Pago e Assinado</span>';
    if (s === 'Apenas Assinado') return '<span class="badge warning">Apenas Assinado</span>';
    return '<span class="badge danger">Cancelado</span>';
}
function colorClass(s) {
    if (s === 'Pago e Assinado') return 'text-success';
    if (s === 'Apenas Assinado') return 'text-warning';
    return 'text-danger';
}
function showToast(msg, type) {
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    t.innerHTML = `<i class="fas fa-${type==='success'?'check-circle':'times-circle'}"></i> ${msg}`;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3000);
}
async function logout() { await auth.signOut(); window.location.href = 'index.html'; }
</script>
