        .v-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}.stat-mini{padding:12px;border-radius:8px;text-align:center}
        .stat-mini.emerald{background:rgba(16,185,129,0.06)}.stat-mini.emerald .sn{color:var(--emerald)}
        .stat-mini.accent{background:rgba(6,182,212,0.06)}.stat-mini.accent .sn{color:var(--accent)}
        .stat-mini.danger{background:rgba(239,68,68,0.06)}.stat-mini.danger .sn{color:var(--red)}

        .v-total{text-align:center;padding-top:14px;border-top:1px solid var(--border)}.v-total .tn{font-size:22px;font-weight:800;color:var(--primary-light)}

        .folder-card{background:var(--glass);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:16px;padding:20px;cursor:pointer;transition:all 0.3s;text-align:center}
        .folder-card:hover{transform:translateY(-3px);border-color:var(--primary)}.folder-icon{font-size:36px;margin-bottom:12px}
        .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);backdrop-filter:blur(10px);z-index:1000;align-items:center;justify-content:center}
        .modal-overlay.show{display:flex}.modal{background:var(--bg3);border:1px solid var(--border-light);border-radius:20px;width:90%;max-width:550px;max-height:85vh;overflow-y:auto;animation:modalIn 0.3s ease}.modal.wide{max-width:780px}
        @keyframes modalIn{from{opacity:0;transform:scale(0.95) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
        .modal-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
        .btn-close{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer}.btn-close:hover{border-color:var(--red);color:var(--red)}
        .modal-body{padding:20px 24px}.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}

    </style>
</head>
<body>
<div class="app">
    <aside class="sidebar" id="sidebar">
        <div class="side-brand"><div class="side-logo">KS</div><div class="side-brand-text"><div class="side-name">Kronos<span>System</span></div><div class="side-badge">Controle de Fechamento</div></div></div>
        <nav class="side-nav">

<input type="file" id="restoreFileInput" style="display:none" accept=".json" onchange="handleRestoreFile(event)">

<!-- MODAL FECHAMENTO -->

    <div class="modal">
        <div class="modal-header"><h4 id="modalTitle">Novo Fechamento</h4><button class="btn-close" onclick="closeModal()">✕</button></div>

</div>

<script>

const firebaseConfig={apiKey:"AIzaSyCPiGXTl0k1Kq4RYEiABZ6tBxScitRhFwM",authDomain:"controle-de-fechamento-f8137.firebaseapp.com",projectId:"controle-de-fechamento-f8137",storageBucket:"controle-de-fechamento-f8137.firebasestorage.app",messagingSenderId:"1016803983243",appId:"1:1016803983243:web:66f2ad592c824bd847798e"};

let fechamentos=[],vendedoresList=[],editandoId=null,currentUser=null,userData=null,currentPage='dashboard';

// ========== AUTENTICAÇÃO ==========
auth.onAuthStateChanged(async(user)=>{if(!user){window.location.href='index.html';return}currentUser=user;try{const userDoc=await db.collection('usuarios').doc(user.uid).get();if(userDoc.exists){userData=userDoc.data();if(user.email===EMAIL_DONO&&userData.role!=='admin'){await db.collection('usuarios').doc(user.uid).update({role:'admin'});userData.role='admin'}}else{userData={nome:user.email.split('@')[0],email:user.email,role:user.email===EMAIL_DONO?'admin':'user',ativo:true};await db.collection('usuarios').doc(user.uid).set({nome:user.email.split('@')[0],email:user.email,role:user.email===EMAIL_DONO?'admin':'user',ativo:true,criadoEm:firebase.firestore.FieldValue.serverTimestamp(),ultimoAcesso:firebase.firestore.FieldValue.serverTimestamp()})}}catch(e){userData={nome:user.email,role:'user'}}await db.collection('usuarios').doc(user.uid).update({ultimoAcesso:firebase.firestore.FieldValue.serverTimestamp()}).catch(()=>{});document.getElementById('userNameDisplay').textContent=userData.nome||user.email.split('@')[0];document.getElementById('userAvatar').textContent=(userData.nome||user.email)[0].toUpperCase();document.getElementById('userRoleDisplay').textContent=userData.role==='admin'?'Administrador':'Usuário';if(userData.role==='admin')document.getElementById('navUsuarios').style.display='flex';await carregarVendedores();iniciarOuvinteFechamentos();setupUI()});
async function carregarVendedores(){const doc=await db.collection('config').doc('vendedores').get();vendedoresList=doc.exists?(doc.data().lista||[]):['PATRICIA','JULYA','EVELLYN','NATALY','VITÓRIA','ENZO','SOPHIA','NICOLY'];if(!doc.exists)await db.collection('config').doc('vendedores').set({lista:vendedoresList});atualizarDatalist()}
function iniciarOuvinteFechamentos(){db.collection('fechamentos').onSnapshot((snapshot)=>{fechamentos=[];snapshot.forEach(doc=>fechamentos.push({id:doc.id,...doc.data()}));renderAll()})}
function setupUI(){document.getElementById('btnMenuToggle').addEventListener('click',()=>{document.getElementById('sidebar').classList.toggle('collapsed');document.getElementById('mainArea').classList.toggle('expanded')});document.querySelectorAll('.nav-item').forEach(item=>{item.addEventListener('click',function(){navigateTo(this.dataset.page)})});updateDate();navigateTo('dashboard')}
function updateDate(){document.getElementById('currentDate').textContent=new Date().toLocaleDateString('pt-BR',{day:'numeric',month:'long',year:'numeric'})}
function navigateTo(page){document.querySelectorAll('.nav-item').forEach(i=>i.classList.toggle('active',i.dataset.page===page));document.getElementById('pageTitle').textContent={dashboard:'Dashboard',fechamentos:'Gestão de Fechamentos',mensal:'Relatório Mensal',vendedores:'Desempenho dos Vendedores',usuarios:'Gerenciar Usuários'}[page]||page;renderPage(page)}
function renderPage(page){currentPage=page;const a=document.getElementById('contentArea');switch(page){case'dashboard':a.innerHTML=renderDashboard();break;case'fechamentos':a.innerHTML=renderFechamentos();setupFiltros();break;case'mensal':a.innerHTML=renderMensal();break;case'vendedores':a.innerHTML=renderVendedores();break;case'usuarios':a.innerHTML=renderUsuarios();setupUsuarios();break}}
function renderAll(){renderPage(currentPage);document.getElementById('navCount').textContent=fechamentos.length}
function atualizarDatalist(){const dl=document.getElementById('vendedoresList');if(dl)dl.innerHTML=vendedoresList.map(v=>`<option value="${v}">`).join('')}

// ========== DASHBOARD ==========
function renderDashboard(){const pagos=fechamentos.filter(f=>f.status==='Pago e Assinado'),assinados=fechamentos.filter(f=>f.status==='Apenas Assinado'),cancelados=fechamentos.filter(f=>f.status==='Cancelado');const vt=fechamentos.reduce((s,f)=>s+(f.valor||0),0);const recentes=[...fechamentos].sort((a,b)=>(b.data+b.horario).localeCompare(a.data+a.horario)).slice(0,8);return`<div class="kpi-row"><div class="kpi-card p"><div class="kpi-icon"><i class="fas fa-handshake"></i></div><div class="kpi-label">Total</div><div class="kpi-value">${fechamentos.length}</div></div><div class="kpi-card e"><div class="kpi-icon"><i class="fas fa-check-double"></i></div><div class="kpi-label">Pagos</div><div class="kpi-value">${pagos.length}</div></div><div class="kpi-card a"><div class="kpi-icon"><i class="fas fa-signature"></i></div><div class="kpi-label">Assinados</div><div class="kpi-value">${assinados.length}</div></div><div class="kpi-card r"><div class="kpi-icon"><i class="fas fa-times-circle"></i></div><div class="kpi-label">Cancelados</div><div class="kpi-value">${cancelados.length}</div></div><div class="kpi-card e"><div class="kpi-icon"><i class="fas fa-dollar-sign"></i></div><div class="kpi-label">Valor Total</div><div class="kpi-value sm">R$ ${vt.toFixed(2)}</div></div></div><div class="panel"><div class="panel-header"><h4><i class="fas fa-clock-rotate-left"></i> Últimos Registros</h4></div><div class="table-wrapper"><table><thead><tr><th>Data</th><th>Vendedor</th><th>Cliente</th><th>Marca</th><th>Status</th><th>Valor</th></tr></thead><tbody>${recentes.map(f=>`<tr><td>${fmtDate(f.data)}</td><td>${f.vendedora}</td><td>${f.cliente}</td><td>${f.marca}</td><td>${badge(f.status)}</td><td class="${colorClass(f.status)}">R$ ${(f.valor||0).toFixed(2)}</td></tr>`).join('')||'<tr><td colspan="6" style="text-align:center;padding:40px">Nenhum registro</td></tr>'}</tbody></table></div></div>`}

// ========== FECHAMENTOS ==========
function renderFechamentos(){return`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px"><h2 style="font-size:20px;font-weight:700">Gestão de Fechamentos</h2><button class="btn btn-primary" onclick="openModal()"><i class="fas fa-plus"></i> Novo Fechamento</button></div><div class="totals-row"><div class="total-box emerald"><h5><i class="fas fa-check-circle"></i> Pagos</h5><div class="big" id="totalPagosValor">R$ 0</div><div class="total-sub" id="totalPagosQtd">0 contratos</div></div><div class="total-box accent"><h5><i class="fas fa-clock"></i> Assinados</h5><div class="big" id="totalAssinadosValor">R$ 0</div><div class="total-sub" id="totalAssinadosQtd">0 contratos</div></div><div class="total-box danger"><h5><i class="fas fa-times-circle"></i> Cancelados</h5><div class="big" id="totalCanceladosValor">R$ 0</div><div class="total-sub" id="totalCanceladosQtd">0 contratos</div></div></div><div class="filter-bar"><div class="filter-group"><label>Início</label><input type="date" class="filter-input" id="filtroDataInicio"></div><div class="filter-group"><label>Fim</label><input type="date" class="filter-input" id="filtroDataFim"></div><div class="filter-group"><label>Vendedor</label><select class="filter-input" id="filtroVendedora"><option value="">Todos</option>${vendedoresList.map(v=>`<option value="${v}">${v}</option>`).join('')}</select></div><div class="filter-group"><label>Status</label><select class="filter-input" id="filtroStatus"><option value="">Todos</option><option value="Pago e Assinado">Pago e Assinado</option><option value="Apenas Assinado">Apenas Assinado</option><option value="Cancelado">Cancelado</option></select></div><button class="btn btn-outline btn-sm" onclick="clearFilters()"><i class="fas fa-times"></i> Limpar</button></div><div class="panel"><div class="table-wrapper"><table><thead><tr><th>Data</th><th>Vendedor</th><th>Horário</th><th>Cliente</th><th>Marca</th><th>Status</th><th>Valor</th><th>Ações</th></tr></thead><tbody id="tabelaFechamentos"></tbody></table></div><div style="padding:12px 20px;color:var(--text3);font-size:10px" id="registrosInfo">0 registros</div></div>`}
function setupFiltros(){['filtroDataInicio','filtroDataFim','filtroVendedora','filtroStatus'].forEach(id=>{const el=document.getElementById(id);if(el)el.addEventListener('change',aplicarFiltros)});aplicarFiltros()}
function aplicarFiltros(){const di=document.getElementById('filtroDataInicio')?.value||'',df=document.getElementById('filtroDataFim')?.value||'',v=document.getElementById('filtroVendedora')?.value||'',s=document.getElementById('filtroStatus')?.value||'';let f=[...fechamentos];if(di)f=f.filter(x=>x.data>=di);if(df)f=f.filter(x=>x.data<=df);if(v)f=f.filter(x=>x.vendedora===v);if(s)f=f.filter(x=>x.status===s);f.sort((a,b)=>(b.data+b.horario).localeCompare(a.data+a.horario));const pagos=f.filter(x=>x.status==='Pago e Assinado'),assinados=f.filter(x=>x.status==='Apenas Assinado'),cancelados=f.filter(x=>x.status==='Cancelado');document.getElementById('totalPagosValor').textContent=`R$ ${pagos.reduce((s,x)=>s+x.valor,0).toFixed(2)}`;document.getElementById('totalPagosQtd').textContent=`${pagos.length} contratos`;document.getElementById('totalAssinadosValor').textContent=`R$ ${assinados.reduce((s,x)=>s+x.valor,0).toFixed(2)}`;document.getElementById('totalAssinadosQtd').textContent=`${assinados.length} contratos`;document.getElementById('totalCanceladosValor').textContent=`R$ ${cancelados.reduce((s,x)=>s+x.valor,0).toFixed(2)}`;document.getElementById('totalCanceladosQtd').textContent=`${cancelados.length} contratos`;const tbody=document.getElementById('tabelaFechamentos');if(tbody)tbody.innerHTML=f.map(x=>`<tr><td>${fmtDate(x.data)}</td><td>${x.vendedora}</td><td>${x.horario}</td><td>${x.cliente}</td><td>${x.marca}</td><td>${badge(x.status)}</td><td class="${colorClass(x.status)}">R$ ${(x.valor||0).toFixed(2)}</td><td style="display:flex;gap:4px"><button class="btn btn-outline btn-icon" onclick="openModal('${x.id}')"><i class="fas fa-edit"></i></button><button class="btn btn-outline danger btn-icon" onclick="deleteFechamento('${x.id}')"><i class="fas fa-trash"></i></button></td></tr>`).join('')||'<tr><td colspan="8" style="text-align:center;padding:40px">Nenhum fechamento</td></tr>';const info=document.getElementById('registrosInfo');if(info)info.textContent=`${f.length} registro(s)`}
function clearFilters(){['filtroDataInicio','filtroDataFim','filtroVendedora','filtroStatus'].forEach(id=>{const el=document.getElementById(id);if(el)el.value=''});aplicarFiltros()}

// ========== RELATÓRIO MENSAL ==========
function renderMensal(){const meses={};fechamentos.forEach(f=>{if(!f.data)return;const k=f.data.substring(0,7);if(!meses[k])meses[k]=[];meses[k].push(f)});const ord=Object.entries(meses).sort((a,b)=>b[0].localeCompare(a[0]));if(ord.length===0)return'<div style="text-align:center;padding:60px"><div style="font-size:48px">📁</div><h3>Nenhum mês</h3></div>';return`<h2 style="font-size:20px;font-weight:700;margin-bottom:20px">📅 Relatório Mensal</h2><div class="folder-grid">${ord.map(([mes,it])=>{const[ano,mn]=mes.split('-'),nome=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'][parseInt(mn)-1];const pagos=it.filter(f=>f.status==='Pago e Assinado'),assinados=it.filter(f=>f.status==='Apenas Assinado'),cancelados=it.filter(f=>f.status==='Cancelado'),val=it.reduce((s,f)=>s+(f.valor||0),0);return`<div class="folder-card" style="position:relative"><div onclick="openMesDetalhe('${mes}')"><div class="folder-icon">📁</div><h4>${nome} ${ano}</h4><div style="font-size:10px;color:var(--text3)">${it.length} fechamentos</div><div style="font-size:16px;font-weight:800;color:var(--emerald)">R$ ${val.toFixed(2)}</div><div style="font-size:9px"><span style="color:var(--emerald)">${pagos.length} pagos</span> · <span style="color:var(--accent)">${assinados.length} assinados</span> · <span style="color:var(--red)">${cancelados.length} cancelados</span></div></div><div style="display:flex;gap:6px;margin-top:10px"><button class="btn btn-outline btn-sm" style="flex:1" onclick="imprimirRelatorio('${mes}')"><i class="fas fa-print"></i> Imprimir</button><button class="btn btn-outline danger btn-sm" style="flex:1" onclick="excluirMes('${mes}')"><i class="fas fa-trash"></i> Excluir</button></div></div>`}).join('')}</div>`}
window.excluirMes=async function(mes){const items=fechamentos.filter(f=>f.data&&f.data.startsWith(mes));const[ano,mn]=mes.split('-');const nome=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'][parseInt(mn)-1];if(items.length===0){showToast('Nenhum fechamento!','error');return}if(!confirm(`⚠️ Excluir TODOS os ${items.length} fechamentos de ${nome} ${ano}?\nValor total: R$ ${items.reduce((s,f)=>s+(f.valor||0),0).toFixed(2)}`))return;if(!confirm('Tem certeza ABSOLUTA?'))return;const c=prompt(`Digite "EXCLUIR" para apagar ${nome} ${ano}:`);if(c!=='EXCLUIR'){showToast('Cancelado!','error');return}let b=db.batch(),ex=0;for(const f of items){b.delete(db.collection('fechamentos').doc(f.id));ex++;if(ex%400===0){await b.commit();b=db.batch()}}if(ex%400!==0)await b.commit();showToast(`${ex} excluídos!`,'success')}
window.openMesDetalhe=function(mes){const items=fechamentos.filter(f=>f.data&&f.data.startsWith(mes));const[ano,mn]=mes.split('-'),nome=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'][parseInt(mn)-1];const pagos=items.filter(f=>f.status==='Pago e Assinado'),assinados=items.filter(f=>f.status==='Apenas Assinado'),cancelados=items.filter(f=>f.status==='Cancelado');const overlay=document.createElement('div');overlay.className='modal-overlay show';overlay.innerHTML=`<div class="modal wide" onclick="event.stopPropagation()"><div class="modal-header"><h3>📁 ${nome} ${ano}</h3><button class="btn-close" onclick="this.closest('.modal-overlay').remove()">✕</button></div><div style="padding:20px"><div class="totals-row"><div class="total-box emerald"><h5>Pagos</h5><div class="big">R$ ${pagos.reduce((s,f)=>s+f.valor,0).toFixed(2)}</div><div class="total-sub">${pagos.length} contratos</div></div><div class="total-box accent"><h5>Assinados</h5><div class="big">R$ ${assinados.reduce((s,f)=>s+f.valor,0).toFixed(2)}</div><div class="total-sub">${assinados.length} contratos</div></div><div class="total-box danger"><h5>Cancelados</h5><div class="big">R$ ${cancelados.reduce((s,f)=>s+f.valor,0).toFixed(2)}</div><div class="total-sub">${cancelados.length} contratos</div></div></div><div class="table-wrapper"><table><thead><tr><th>Data</th><th>Vendedor</th><th>Cliente</th><th>Marca</th><th>Status</th><th>Valor</th></tr></thead><tbody>${items.map(f=>`<tr><td>${fmtDate(f.data)}</td><td>${f.vendedora}</td><td>${f.cliente}</td><td>${f.marca}</td><td>${badge(f.status)}</td><td class="${colorClass(f.status)}">R$ ${(f.valor||0).toFixed(2)}</td></tr>`).join('')}</tbody></table></div></div></div>`;overlay.addEventListener('click',function(e){if(e.target===this)this.remove()});document.body.appendChild(overlay)}

// ========== VENDEDORES ==========
function renderVendedores(){const stats={};vendedoresList.forEach(v=>{stats[v]={t:0,p:0,a:0,c:0,vp:0,va:0,vc:0}});fechamentos.forEach(f=>{if(!stats[f.vendedora])stats[f.vendedora]={t:0,p:0,a:0,c:0,vp:0,va:0,vc:0};stats[f.vendedora].t++;if(f.status==='Pago e Assinado'){stats[f.vendedora].p++;stats[f.vendedora].vp+=f.valor}else if(f.status==='Apenas Assinado'){stats[f.vendedora].a++;stats[f.vendedora].va+=f.valor}else{stats[f.vendedora].c++;stats[f.vendedora].vc+=f.valor}});const av=['#4f46e5','#7c3aed','#10b981','#06b6d4','#f43f5e','#8b5cf6'];return`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px"><h2 style="font-size:20px">Desempenho dos Vendedores</h2><button class="btn btn-primary" onclick="novoVendedor()"><i class="fas fa-plus"></i> Novo</button></div><div class="vendedor-grid">${vendedoresList.map((n,i)=>{const s=stats[n]||{t:0,p:0,a:0,c:0,vp:0,va:0,vc:0};return`<div class="v-card"><div class="v-header"><div class="v-avatar" style="background:${av[i%6]}">${n.charAt(0)}</div><div><div class="v-name" onclick="editarVendedor('${n}')">${n} <i class="fas fa-pen" style="font-size:8px"></i></div><div style="font-size:10px;color:var(--text3)">${s.t} fechamentos</div></div></div><div class="v-stats"><div class="stat-mini emerald"><div class="sn">${s.p}</div><div class="sl">Pagos</div><div class="sv">R$ ${s.vp.toFixed(2)}</div></div><div class="stat-mini accent"><div class="sn">${s.a}</div><div class="sl">Assinados</div><div class="sv">R$ ${s.va.toFixed(2)}</div></div><div class="stat-mini danger"><div class="sn">${s.c}</div><div class="sl">Cancelados</div><div class="sv">R$ ${s.vc.toFixed(2)}</div></div></div><div class="v-total"><div class="tn">R$ ${(s.vp+s.va+s.vc).toFixed(2)}</div></div></div>`}).join('')||'<div style="grid-column:1/-1;text-align:center;padding:40px">Nenhum vendedor</div>'}</div>`}
window.editarVendedor=function(nome){const n=prompt('Novo nome:',nome);if(!n||n.toUpperCase()===nome)return;atualizarVendedor(nome,n.toUpperCase())}
window.novoVendedor=function(){const n=prompt('Nome:');if(!n)return;const nu=n.toUpperCase();if(vendedoresList.includes(nu)){alert('Já existe!');return}vendedoresList.push(nu);db.collection('config').doc('vendedores').set({lista:vendedoresList});renderCurrentPage()}
async function atualizarVendedor(oldName,newName){if(vendedoresList.includes(newName)&&oldName!==newName){alert('Já existe!');return}const i=vendedoresList.indexOf(oldName);if(i>=0)vendedoresList[i]=newName;await db.collection('config').doc('vendedores').set({lista:vendedoresList});const s=await db.collection('fechamentos').where('vendedora','==',oldName).get();const b=db.batch();s.forEach(d=>b.update(d.ref,{vendedora:newName}));await b.commit();renderCurrentPage()}

// ========== USUÁRIOS ==========
function renderUsuarios(){if(userData.role!=='admin')return'<div style="text-align:center;padding:60px"><h3>🔒 Acesso restrito ao administrador</h3></div>';return`<h2 style="font-size:20px;margin-bottom:20px">👥 Gerenciar Usuários</h2><div class="panel"><div class="table-wrapper"><table><thead><tr><th>Nome</th><th>Email</th><th>Status</th><th>Cadastro</th><th>Último Acesso</th><th>Ações</th></tr></thead><tbody id="tabelaUsuarios"></tbody></table></div></div>`}
async function setupUsuarios(){if(userData.role!=='admin')return;const s=await db.collection('usuarios').orderBy('criadoEm','desc').get();const t=document.getElementById('tabelaUsuarios');t.innerHTML=s.docs.map(d=>{const u=d.data();return`<tr><td><strong>${u.nome||'-'}</strong></td><td>${u.email}</td><td><span class="badge ${u.ativo!==false?'success':'danger'}">${u.ativo!==false?'Ativo':'Inativo'}</span></td><td>${u.criadoEm?new Date(u.criadoEm.toDate()).toLocaleDateString('pt-BR'):'-'}</td><td>${u.ultimoAcesso?new Date(u.ultimoAcesso.toDate()).toLocaleString('pt-BR'):'-'}</td><td><button class="btn btn-outline btn-sm" onclick="toggleUsuario('${d.id}',${u.ativo!==false})">${u.ativo!==false?'🔒 Bloquear':'🔓 Ativar'}</button></td></tr>`}).join('')||'<tr><td colspan="6" style="text-align:center;padding:40px">Nenhum usuário</td></tr>'}
window.toggleUsuario=async function(uid,ativo){if(!confirm(`${ativo?'Bloquear':'Ativar'}?`))return;await db.collection('usuarios').doc(uid).update({ativo:!ativo});setupUsuarios();showToast('Usuário atualizado!','success')}

// ========== MODAL CRUD ==========
function openModal(id){editandoId=id||null;document.getElementById('formFechamento').reset();if(id){document.getElementById('modalTitle').textContent='Editar Fechamento';const f=fechamentos.find(x=>x.id===id);if(f){document.getElementById('inputData').value=f.data||'';document.getElementById('inputHorario').value=f.horario||'';document.getElementById('inputVendedora').value=f.vendedora||'';document.getElementById('inputCliente').value=f.cliente||'';document.getElementById('inputMarca').value=f.marca||'';document.getElementById('inputValor').value=f.valor||'';document.getElementById('inputStatus').value=f.status||'Apenas Assinado'}}else{document.getElementById('modalTitle').textContent='Novo Fechamento';document.getElementById('inputData').value=new Date().toISOString().split('T')[0];document.getElementById('inputHorario').value=new Date().toTimeString().slice(0,5)}document.getElementById('modalOverlay').classList.add('show');document.body.style.overflow='hidden'}
function closeModal(){document.getElementById('modalOverlay').classList.remove('show');document.body.style.overflow='';editandoId=null}
async function salvarFechamento(e){e.preventDefault();const dados={data:document.getElementById('inputData').value,horario:document.getElementById('inputHorario').value,vendedora:document.getElementById('inputVendedora').value.trim().toUpperCase(),cliente:document.getElementById('inputCliente').value.trim().toUpperCase(),marca:document.getElementById('inputMarca').value.trim(),status:document.getElementById('inputStatus').value,valor:parseFloat(document.getElementById('inputValor').value)};if(!dados.data||!dados.vendedora||!dados.cliente||!dados.marca||!dados.status||isNaN(dados.valor)){alert('⚠️ Preencha todos os campos obrigatórios!');return}try{if(editandoId){await db.collection('fechamentos').doc(editandoId).update(dados);showToast('Fechamento atualizado!','success')}else{await db.collection('fechamentos').add(dados);showToast('Fechamento criado com sucesso!','success')}closeModal()}catch(error){alert('Erro ao salvar: '+error.message);showToast('Erro ao salvar!','error')}}
function deleteFechamento(id){const f=fechamentos.find(x=>x.id===id);if(f&&confirm(`Excluir fechamento de "${f.cliente}"?`)){db.collection('fechamentos').doc(id).delete();showToast('Excluído!','success')}}

// ========== BACKUP/RESTORE/EXCEL ==========
function fazerBackup(){const b={fechamentos:fechamentos.map(f=>({data:f.data,horario:f.horario,vendedora:f.vendedora,cliente:f.cliente,marca:f.marca,status:f.status,valor:f.valor})),vendedores:vendedoresList,exportadoEm:new Date().toISOString()};const bl=new Blob([JSON.stringify(b,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(bl);a.download=`backup_${new Date().toISOString().split('T')[0]}.json`;a.click();showToast('Backup baixado!','success')}
function restaurarBackup(){document.getElementById('restoreFileInput').click()}
async function handleRestoreFile(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=async function(ev){try{const d=JSON.parse(ev.target.result);const cli=d.fechamentos||d.data||[];if(!Array.isArray(cli)||cli.length===0){alert('Arquivo inválido!');return}if(!confirm(`Importar ${cli.length} fechamentos?`))return;if(d.vendedores)await db.collection('config').doc('vendedores').set({lista:d.vendedores});let imp=0;for(const c of cli){try{await db.collection('fechamentos').add({data:c.data||'',horario:c.horario||'00:00',vendedora:(c.vendedora||'').toUpperCase(),cliente:(c.cliente||'').toUpperCase(),marca:c.marca||'',status:c.status||'Apenas Assinado',valor:parseFloat(c.valor)||0});imp++}catch(err){console.error(err)}}showToast(`${imp} importados!`,'success')}catch(err){alert('Erro: '+err.message)}};r.readAsText(f);e.target.value=''}
function exportarExcel(){if(fechamentos.length===0){showToast('Sem dados!','error');return}let csv='\uFEFFData;Vendedora;Horário;Cliente;Marca;Status;Valor\n';fechamentos.sort((a,b)=>(b.data+b.horario).localeCompare(a.data+a.horario)).forEach(f=>{csv+=`${fmtDate(f.data)};${f.vendedora};${f.horario};${f.cliente};${f.marca};${f.status};R$ ${(f.valor||0).toFixed(2)}\n`});const bl=new Blob([csv],{type:'text/csv;charset=utf-8;'});const a=document.createElement('a');a.href=URL.createObjectURL(bl);a.download=`excel_${new Date().toISOString().split('T')[0]}.csv`;a.click();showToast('Excel exportado!','success')}

function fmtDate(d){if(!d)return'-';const[y,m,day]=d.split('-');return`${day}/${m}/${y}`}
function badge(s){if(s==='Pago e Assinado')return'<span class="badge success">Pago e Assinado</span>';if(s==='Cancelado')return'<span class="badge danger">Cancelado</span>';return'<span class="badge warning">Apenas Assinado</span>'}
function colorClass(s){if(s==='Pago e Assinado')return'text-success';if(s==='Apenas Assinado')return'text-warning';return'text-danger'}
function showToast(msg,type){const t=document.createElement('div');t.className=`toast ${type}`;t.innerHTML=`<i class="fas fa-${type==='success'?'check-circle':'times-circle'}"></i> ${msg}`;document.body.appendChild(t);setTimeout(()=>t.remove(),3000)}
async function logout(){await auth.signOut();window.location.href='index.html'}
document.getElementById('modalOverlay').addEventListener('click',function(e){if(e.target===this)closeModal()})
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal()})
</script>
